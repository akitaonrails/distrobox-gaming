---
- name: Full gaming distrobox setup
  hosts: localhost
  connection: local
  gather_facts: true
  roles:
    - { role: check_host,                tags: [check] }
    - { role: create_box,                tags: [create] }
    - { role: bootstrap_packages,        tags: [bootstrap] }
    - { role: refresh_shadps4,           tags: [shadps4] }
    - { role: install_hedgemodmanager,   tags: [hedgemodmanager] }
    - { role: install_eden_cheats_manager, tags: [eden_cheats_manager] }
    - { role: link_storage,              tags: [configure, storage] }
    - { role: seed_configs,              tags: [configure, configs, reset_configs] }
    - { role: scripts_in_box,            tags: [configure, scripts] }
    # Opt-in roles: skipped by default, run only when the matching tag
    # is explicitly passed (e.g. --tags dlcs). These operate against
    # your specific NAS/ROM layout or make large downloads.
    - { role: install_dlcs,              tags: [dlcs, never] }
    - { role: switch_cheats,             tags: [cheats, never] }
    - { role: rpcs3_per_game_configs,    tags: [rpcs3_configs, never] }
    - { role: retroarch_extras,          tags: [retroarch, never] }
    - { role: pcsx2_textures,            tags: [pcsx2_textures, never] }
    - { role: install_pc_racing,         tags: [pc_racing, never] }
    - { role: metal_gear_master_collection, tags: [metal_gear_master_collection, never] }
    - { role: steam_lib32_nvidia,        tags: [steam_lib32_nvidia, never] }
    - { role: steam_trainers,            tags: [steam_trainers, never] }
    - { role: install_sm64plus,          tags: [sm64plus, never] }
    - { role: install_sonic_p06,         tags: [sonic_p06, never] }
    - { role: install_unleashed_recomp,  tags: [unleashed_recomp, never] }
    - { role: desktop_apps,              tags: [configure, desktop, reset_configs] }
    - { role: configure_esde,            tags: [configure, esde, reset_configs] }
    - { role: shell_config,              tags: [configure, shell, reset_configs] }
    - { role: verify,                    tags: [verify] }
