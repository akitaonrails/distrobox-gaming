---
- name: Install or update OutRun 2006
  hosts: localhost
  connection: local
  gather_facts: true
  vars:
    dg_pc_racing_selected_slugs:
      - outrun-2006
    dg_pc_racing_run_installers: true
    dg_pc_racing_export_desktop: true
  roles:
    - install_pc_racing
    - { role: verify, tags: [verify] }
