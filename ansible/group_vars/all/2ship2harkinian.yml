# 2Ship2Harkinian native Linux Majora's Mask PC port.

dg_two_ship2harkinian_version: "4.0.2"
dg_two_ship2harkinian_release_name: "Keiichi Charlie"
dg_two_ship2harkinian_asset_name: 2Ship-Keiichi-Charlie-Linux.zip
dg_two_ship2harkinian_asset_url: "https://github.com/HarbourMasters/2ship2harkinian/releases/download/{{ dg_two_ship2harkinian_version }}/{{ dg_two_ship2harkinian_asset_name }}"
dg_two_ship2harkinian_asset_sha256: c97fc9440f5584f350c911ec7385778394aa62f651c6613cee0b74c0141932cb

dg_two_ship2harkinian_repo_url: https://github.com/HarbourMasters/2ship2harkinian.git
dg_two_ship2harkinian_git_ref: acfd617302ebb74e63f26f0049b53400a644c8e8

dg_two_ship2harkinian_root: "{{ dg_box_home }}/tools/2ship2harkinian"
dg_two_ship2harkinian_install_dir: "{{ dg_two_ship2harkinian_root }}/current"
dg_two_ship2harkinian_cache_dir: "{{ dg_two_ship2harkinian_root }}/cache"
dg_two_ship2harkinian_bin: "{{ dg_box_home }}/bin/2ship2harkinian"
dg_two_ship2harkinian_appimage_name: 2ship.appimage

# Local ROM is byte-swapped (.n64 / v64 order). The role converts it to a
# canonical big-endian z64 copy in the install directory and verifies the
# Majora's Mask USA SHA1 before launch.
dg_two_ship2harkinian_rom_source: "{{ dg_rom_mid_root }}/n64/Legend of Zelda, The - Majora's Mask (USA).n64"
dg_two_ship2harkinian_rom_name: mm.z64
dg_two_ship2harkinian_rom_sha1: d6133ace5afaa0882cf214cf88daba39e266c078

dg_two_ship2harkinian_install_id: "{{ dg_two_ship2harkinian_version }}-{{ dg_two_ship2harkinian_git_ref }}-{{ dg_two_ship2harkinian_asset_sha256 }}"
dg_two_ship2harkinian_rom_id: "{{ dg_two_ship2harkinian_rom_sha1 }}"

dg_two_ship2harkinian_pacman_packages:
  - unzip
  - fuse2
  - zenity
