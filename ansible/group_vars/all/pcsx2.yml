# PCSX2 texture replacements and per-game patches.
#
# Each entry under dg_pcsx2_texture_packs deploys to
#   $DG_BOX_HOME/.config/PCSX2/textures/<serial>/replacements/<link_as>/
# by symlinking from the source path. Symlinking keeps the 8 GB+ texture
# packs on the NAS instead of duplicating to local disk; PCSX2 caches
# textures in RAM after first use, so the NFS hit only happens once.
#
# .pnach patch files symlink into ~/.config/PCSX2/patches/<basename>.

dg_pcsx2_ps2_root: /mnt/terachad/Emulators/ps2
dg_pcsx2_textures_root: "{{ dg_box_home }}/.config/PCSX2/textures"
dg_pcsx2_patches_dir: "{{ dg_box_home }}/.config/PCSX2/patches"
dg_pcsx2_cheats_dir: "{{ dg_box_home }}/.config/PCSX2/cheats"

# Per-CRC pnach files that go into ~/.config/PCSX2/cheats/. These are
# "user cheats" that PCSX2 only applies when "Enable Cheats" is on per
# game (Game Properties → Patches → Enable Cheats). Symlinking the
# whole NAS cheats dir.
dg_pcsx2_cheats_source: "{{ dg_pcsx2_ps2_root }}/cheats"

# Standalone .pnach patch files in the NAS that should symlink into
# ~/.config/PCSX2/patches/ (auto-applied when CRC matches loaded ROM).
# Skip files that duplicate dg_pcsx2_patch_urls (e.g. Silent's triggers
# patch is fetched fresh from his GitHub above; the NAS copy is identical).
dg_pcsx2_extra_patches: []

dg_pcsx2_texture_packs:
  - serial: SCUS-97328              # Gran Turismo 4 (NTSC-U / USA)
    name: "Gran Turismo 4"
    sources:
      - path: "{{ dg_pcsx2_ps2_root }}/Gran Turismo 4 Remaster/Gran Turismo 4 HD HUD & UI Texture pack by Silentwarior112/replacements"
        link_as: hd-hud-ui
      - path: "{{ dg_pcsx2_ps2_root }}/Gran Turismo 4 Remaster/update 2.1/replacements"
        link_as: hd-hud-ui-update-2.1
      - path: "{{ dg_pcsx2_ps2_root }}/Gran Turismo 4 Remaster/HD HUD & U.I. blocky haze fix v2/text files jap kor usa pal shared"
        link_as: blocky-haze-fix
    patches:
      - "{{ dg_pcsx2_ps2_root }}/Gran Turismo 4 Remaster/06AD9CA0.pnach"
      - "{{ dg_pcsx2_ps2_root }}/Gran Turismo 4 Remaster/44A61C8F.pnach"

  - serial: SLUS-20967              # Enthusia Professional Racing (NTSC-U)
    name: "Enthusia Professional Racing"
    sources:
      - path: "{{ dg_pcsx2_ps2_root }}/Enthusia/SLUS-20967/replacements"
        link_as: hd-textures
    patches: []

# Per-game .pnach patches fetched from public sources at deploy time.
# Each entry is downloaded with ansible.builtin.get_url and written to
#   ~/.config/PCSX2/patches/<basename>
# PCSX2 only loads .pnach files whose CRC in the filename matches the
# loaded ROM's CRC, so dropping in patches for other regions is harmless.
dg_pcsx2_patch_urls:
  # Silent's GT4 USA patches (https://silentsblog.com/mods/gran-turismo-4/)
  # SCUS-97328 / CRC 77E61C8A — adjusted triggers, GT3-style cam, far chase cam.
  # No deinterlace patch needed: USA retail GT4 has progressive scan natively.
  - https://raw.githubusercontent.com/CookiePLMonster/Console-Cheat-Codes/master/PS2/Gran%20Turismo%204/Adjusted%20triggers%20sensitivity/SCUS-97328_77E61C8A_triggers.pnach
  - https://raw.githubusercontent.com/CookiePLMonster/Console-Cheat-Codes/master/PS2/Gran%20Turismo%204/GT3%20style%20camera/SCUS-97328_77E61C8A_gt3cam.pnach
  - https://raw.githubusercontent.com/CookiePLMonster/Console-Cheat-Codes/master/PS2/Gran%20Turismo%204/Far%20chase%20camera/SCUS-97328_77E61C8A_farchasecam.pnach

# Per-game graphics/system settings written to
#   ~/.config/PCSX2/gamesettings/<SERIAL>.ini
# overriding the global PCSX2.ini for that game.
dg_pcsx2_per_game_settings:
  - serial: SCUS-97328
    name: "Gran Turismo 4"
    settings:
      - { section: "EmuCore/GS", option: "AspectRatio", value: "Widescreen (16:9)" }
      - { section: "EmuCore/GS", option: "AccurateBlendingUnit", value: "Basic" }
      - { section: "EmuCore/GS", option: "MaxAnisotropy", value: "16" }
      - { section: "EmuCore/GS", option: "TextureFiltering", value: "2" }
      - { section: "EmuCore/GS", option: "LoadTextureReplacements", value: "true" }
      - { section: "EmuCore/GS", option: "PrecacheTextureReplacements", value: "false" }
      - { section: "EmuCore/GS", option: "TextureReplacementsAsync", value: "true" }
      - { section: "EmuCore", option: "EnableWideScreenPatches", value: "true" }

  - serial: SLUS-20967
    name: "Enthusia Professional Racing"
    settings:
      - { section: "EmuCore/GS", option: "AspectRatio", value: "Widescreen (16:9)" }
      - { section: "EmuCore/GS", option: "MaxAnisotropy", value: "16" }
      - { section: "EmuCore/GS", option: "TextureFiltering", value: "2" }
      - { section: "EmuCore/GS", option: "LoadTextureReplacements", value: "true" }
      - { section: "EmuCore/GS", option: "PrecacheTextureReplacements", value: "false" }
      - { section: "EmuCore/GS", option: "TextureReplacementsAsync", value: "true" }
      - { section: "EmuCore", option: "EnableWideScreenPatches", value: "true" }
