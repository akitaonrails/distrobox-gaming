# ES-DE custom system definitions.
# Each entry generates a <system> block in es_systems.xml.
#
# Path strategy: every system uses an explicit absolute path under the
# EmuDeck rom-tree split. ES-DE's %ROMPATH% / ROMDirectory setting is
# unused — different systems live in different tier dirs (roms /
# roms_mid / roms_heavy / roms_rare) and ES-DE only supports one
# ROMDirectory, so a single %ROMPATH% can't cover them all.

dg_esde_systems:
  - name: switch
    fullname: Nintendo Switch
    path: "{{ dg_emudeck_root }}/roms_heavy/switch"
    extension: ".nca .NCA .nro .NRO .nso .NSO .nsp .NSP .xci .XCI"
    commands:
      - { label: "Eden (Standalone)", cmd: "env -u QT_STYLE_OVERRIDE eden %ROM%" }
      - { label: "Ryujinx (Standalone)", cmd: "%EMULATOR_RYUJINX% %ROM%" }
    platform: switch
    theme: switch

  - name: psx
    fullname: Sony PlayStation
    path: "{{ dg_emudeck_root }}/roms/psx"
    extension: ".bin .BIN .cbn .CBN .ccd .CCD .chd .CHD .cue .CUE .ecm .ECM .exe .EXE .img .IMG .iso .ISO .m3u .M3U .mdf .MDF .mds .MDS .minipsf .MINIPSF .pbp .PBP .psexe .PSEXE .psf .PSF .toc .TOC .z .Z .znx .ZNX .7z .7Z .zip .ZIP"
    commands:
      - { label: "DuckStation (Standalone)", cmd: "duckstation-qt -batch %ROM%" }
      - { label: "Beetle PSX HW", cmd: "%EMULATOR_RETROARCH% -L %CORE_RETROARCH%/mednafen_psx_hw_libretro.so %ROM%" }
      - { label: "Beetle PSX", cmd: "%EMULATOR_RETROARCH% -L %CORE_RETROARCH%/mednafen_psx_libretro.so %ROM%" }
    platform: psx
    theme: psx

  - name: ps2
    fullname: Sony PlayStation 2
    path: "{{ dg_emudeck_root }}/roms_heavy/ps2"
    extension: ".bin .BIN .chd .CHD .ciso .CISO .cso .CSO .dump .DUMP .elf .ELF .gz .GZ .m3u .M3U .mdf .MDF .img .IMG .iso .ISO .isz .ISZ .ngr .NRG .zso .ZSO"
    commands:
      - { label: "PCSX2 (Standalone)", cmd: "pcsx2-qt -batch %ROM%" }
      - { label: "PCSX2 (RetroArch)", cmd: "%EMULATOR_RETROARCH% -L %CORE_RETROARCH%/pcsx2_libretro.so %ROM%" }
    platform: ps2
    theme: ps2

  - name: dreamcast
    fullname: Sega Dreamcast
    path: "{{ dg_emudeck_root }}/roms_mid/dreamcast"
    extension: ".cdi .CDI .chd .CHD .cue .CUE .dat .DAT .elf .ELF .gdi .GDI .iso .ISO .lst .LST .m3u .M3U .7z .7Z .zip .ZIP"
    commands:
      - { label: "Flycast (Standalone)", cmd: "{{ dg_box_home }}/bin/flycast-hires %ROM%" }
      - { label: "Flycast (RetroArch)", cmd: "%EMULATOR_RETROARCH% -L %CORE_RETROARCH%/flycast_libretro.so %ROM%" }
    platform: dreamcast
    theme: dreamcast

  - name: gc
    fullname: Nintendo GameCube
    path: "{{ dg_emudeck_root }}/roms_heavy/gc"
    extension: ".ciso .CISO .dff .DFF .dol .DOL .elf .ELF .gcm .GCM .gcz .GCZ .iso .ISO .json .JSON .m3u .M3U .rvz .RVZ .tgc .TGC .wad .WAD .wbfs .WBFS .wia .WIA .7z .7Z .zip .ZIP"
    commands:
      - { label: "Dolphin (Standalone)", cmd: "dolphin-emu -b -e %ROM%" }
      - { label: "Dolphin (RetroArch)", cmd: "%EMULATOR_RETROARCH% -L %CORE_RETROARCH%/dolphin_libretro.so %ROM%" }
    platform: gc
    theme: gc

  - name: wii
    fullname: Nintendo Wii
    path: "{{ dg_emudeck_root }}/roms_heavy/wii"
    extension: ".ciso .CISO .dff .DFF .dol .DOL .elf .ELF .gcm .GCM .gcz .GCZ .iso .ISO .json .JSON .m3u .M3U .rvz .RVZ .tgc .TGC .wad .WAD .wbfs .WBFS .wia .WIA .7z .7Z .zip .ZIP"
    commands:
      - { label: "Dolphin (Standalone)", cmd: "dolphin-emu -b -e %ROM%" }
      - { label: "Dolphin (RetroArch)", cmd: "%EMULATOR_RETROARCH% -L %CORE_RETROARCH%/dolphin_libretro.so %ROM%" }
    platform: wii
    theme: wii

  - name: psp
    fullname: Sony PlayStation Portable
    path: "{{ dg_emudeck_root }}/roms_mid/psp"
    extension: ".chd .CHD .cso .CSO .elf .ELF .iso .ISO .pbp .PBP .prx .PRX .7z .7Z .zip .ZIP"
    commands:
      - { label: "PPSSPP (Standalone)", cmd: "PPSSPPQt %ROM%" }
      - { label: "PPSSPP (RetroArch)", cmd: "%EMULATOR_RETROARCH% -L %CORE_RETROARCH%/ppsspp_libretro.so %ROM%" }
    platform: psp
    theme: psp

  - name: ps4
    fullname: Sony PlayStation 4
    path: "{{ dg_shadps4_game_dir }}"
    extension: ".bin .BIN"
    commands:
      - label: "shadPS4 Driveclub (Standalone)"
        cmd: "{{ dg_shadps4_bin }} -g {{ dg_shadps4_game_arg }} -p {{ dg_shadps4_patch_xml }} -f true"
    platform: ps4
    theme: ps4

  - name: xbox
    fullname: Microsoft Xbox
    path: "{{ dg_emudeck_root }}/roms_heavy/xbox"
    extension: ".iso .ISO .xiso .XISO"
    commands:
      # Wrapper at $HOME/bin/xemu re-asserts surface_scale in xemu.toml
      # before delegating to /opt/xemu/bin/xemu (xemu doesn't persist
      # the Int. Resolution Scale on shutdown on this stack).
      - label: "xemu (Standalone)"
        cmd: "{{ dg_box_home }}/bin/xemu -dvd_path %ROM%"
    platform: xbox
    theme: xbox

  - name: n3ds
    fullname: Nintendo 3DS
    # Absolute path — 3DS ROMs live under dg_rom_heavy_root with the
    # rest of the larger systems (PS3, GameCube, Wii, etc.).
    path: "{{ dg_azahar_game_dir }}"
    extension: ".3ds .3DS .cci .CCI .cxi .CXI .app .APP .elf .ELF .cia .CIA .3dsx .3DSX"
    commands:
      - { label: "Azahar (Standalone)", cmd: "{{ dg_azahar_bin }} %ROM%" }
    platform: n3ds
    theme: n3ds

  - name: xbox360
    fullname: Microsoft Xbox 360
    # Absolute path so ES-DE doesn't depend on whichever ROMPATH root is
    # active. xbox360 ROMs live under dg_rom_heavy_root (a separate tree
    # from the smaller-system ROMs).
    path: "{{ dg_xenia_game_dir }}"
    extension: ".iso .ISO .xex .XEX"
    commands:
      # Wrapper resolves %ROM% to its per-game .config.toml via Xenia
      # Manager's games.json, then runs xenia_canary.exe in the
      # dg_xenia_prefix wineprefix. Falls back to default config with a
      # stderr warning if the ROM is unmapped (e.g. XBLA folder hashes
      # whose tracked path in games.json doesn't match an .iso/.xex
      # filename ES-DE scanned).
      - label: "Xenia Canary (per-game config)"
        cmd: "{{ dg_box_home }}/bin/xenia-canary-launch %ROM%"
    platform: xbox360
    theme: xbox360

  - name: model3
    fullname: Sega Model 3
    path: "{{ dg_emudeck_root }}/roms_rare/model3"
    extension: ".zip .ZIP"
    commands:
      - { label: "Supermodel (Standalone)", cmd: "supermodel %ROM%" }
    platform: arcade
    theme: model3

  - name: naomi
    fullname: Sega NAOMI
    path: "{{ dg_emudeck_root }}/roms_rare/naomi"
    extension: ".bin .BIN .cdi .CDI .chd .CHD .cue .CUE .dat .DAT .elf .ELF .gdi .GDI .iso .ISO .lst .LST .zip .ZIP .7z .7Z"
    commands:
      - { label: "Flycast (Standalone)", cmd: "{{ dg_box_home }}/bin/flycast-hires %ROM%" }
      - { label: "Flycast (RetroArch)", cmd: "%EMULATOR_RETROARCH% -L %CORE_RETROARCH%/flycast_libretro.so %ROM%" }
    platform: arcade
    theme: naomi
