# Optional Windows PC racing games managed with Wine inside the distrobox.

dg_pc_racing_source_root: "{{ dg_roms_final_root }}/PC"
dg_pc_racing_usb_root: "{{ dg_external_usb_games_root }}"
dg_pc_racing_install_root: "{{ dg_box_home }}/Games/pc-racing"
dg_pc_racing_prefix_root: "{{ dg_box_home }}/wineprefixes/pc-racing"
dg_pc_racing_media_root: "{{ dg_box_home }}/tools/pc-racing/media"
dg_pc_racing_cache_root: "{{ dg_box_home }}/cache/pc-racing"
dg_pc_racing_wine_runner_root: "{{ dg_box_home }}/tools/wine-runners"
# Older Wine builds extracted as sidecar runners for games that regress
# on the current release. Each entry resolves to an Arch pkg.tar.zst,
# pulled from /var/cache/pacman/pkg if present, else from
# archive.archlinux.org. A game opts in via wine_binary/wine_path.
dg_pc_racing_pinned_wine_runners:
  - version: "11.8"
    release: "1"
dg_pc_racing_directx_jun2010_redist: "{{ dg_pc_racing_source_root }}/Project 06 - Silver Release (Patch v1.45)/Sonic the Hedgehog (P-06)/Redist/directx_Jun2010_redist.exe"
dg_pc_racing_xidi_version: v4.3.1
dg_pc_racing_xidi_url: "https://github.com/samuelgr/Xidi/releases/download/{{ dg_pc_racing_xidi_version }}/Xidi-{{ dg_pc_racing_xidi_version }}.zip"
dg_pc_racing_xidi_archive: "{{ dg_pc_racing_cache_root }}/Xidi-{{ dg_pc_racing_xidi_version }}.zip"
dg_pc_racing_wine_path: /usr/local/sbin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
dg_pc_racing_winearch: win64
dg_pc_racing_gamescope_enabled: true
dg_pc_racing_gamescope_width: 3840
dg_pc_racing_gamescope_height: 2160
# Top-left logical position of the gaming monitor (Samsung Odyssey G8,
# DP-1) in the Hyprland layout from ~/.config/hypr/monitors.conf.
dg_pc_racing_target_monitor_x: 4000
dg_pc_racing_target_monitor_y: 619
dg_pc_racing_gamepad_device: /dev/input/js0
dg_pc_racing_gamepad_only: "0x2dc8/0x310b"
dg_pc_racing_sdl_hidapi: "0"
dg_pc_racing_dinput_disabled_joysticks:
  - ZSA Technology Labs Moonlander Mark I
  - ZSA Technology Labs Moonlander Mark I System Control
  - ZSA Technology Labs Moonlander Mark I Consumer Control
  - ZSA Technology Labs Moonlander Mark I Keyboard
  - 8BitDo Ultimate 2 Wireless Controller
  - 8BitDo 8BitDo Ultimate 2 Wireless Controller for PC
  - 8BitDo 8BitDo Ultimate 2 Wireless Controller for PC Keyboard
  - 8BitDo 8BitDo Ultimate 2 Wireless Controller for PC Mouse
dg_pc_racing_winebus_registry:
  - name: DisableHidraw
    value: 1
  - name: DisableInput
    value: 1
  - name: Enable SDL
    value: 1
  - name: Map Controllers
    value: 0
dg_pc_racing_run_installers: false
dg_pc_racing_copy_unpacked: true
dg_pc_racing_export_desktop: false
dg_pc_racing_selected_slugs: []
dg_pc_racing_cleanup_legacy: true

dg_pc_racing_legacy_packages:
  - lutris
  - umu-launcher

dg_pc_racing_legacy_paths:
  - "{{ dg_box_home }}/.cache/lutris"
  - "{{ dg_box_home }}/.cache/umu"
  - "{{ dg_box_home }}/.cache/umu-protonfixes"
  - "{{ dg_box_home }}/.config/lutris"
  - "{{ dg_box_home }}/.local/share/lutris"
  - "{{ dg_box_home }}/.local/share/umu"
  - "{{ dg_box_home }}/cache/pc-racing/lutris-runners"

dg_pc_racing_packages:
  - wine
  - winetricks
  - wine-mono
  - wine-gecko
  - sdl2
  - gamescope
  - joyutils
  - p7zip
  - innoextract
  - rsync

dg_pc_racing_games:
  - slug: colin-mcrae-rally-2
    name: "Colin McRae Rally 2.0"
    install_mode: installer
    source_dir: "{{ dg_pc_racing_source_root }}/Colin-McRae-Rally-2-0_Win_EN-FR-ES_US_CD_Extracted"
    installer: Setup.exe
    install_args: []
    launch_exe: "CMR2.exe"
    installed_path: "{{ dg_pc_racing_prefix_root }}/colin-mcrae-rally-2/drive_c/Program Files (x86)/Codemasters/Colin McRae Rally 2"
    # Wine virtual desktop is REQUIRED for CMR2. Without it the game's
    # D3D7 3D menu surface never composites to the window — intro
    # video plays, audio works, screen freezes on the last video frame
    # while the menu is silently rendered into a backbuffer wine can't
    # display. The fullscreen mode-switch path the game uses to swap
    # from video to 3D rendering interacts badly with the wlroots /
    # Xwayland / NVIDIA combination on this host stack; wrapping the
    # process in `wine explorer /desktop=...` keeps everything inside a
    # plain X11 child window and bypasses the broken handoff.
    # Referenced fix: https://www.patrickmin.com/linux/tip.php?name=cmr2
    wine_desktop:
      name: cmr2
      # Matches SilentPatch's widescreen ceiling. The in-game picker
      # then offers 4K too (wine virtual desktop renegotiates with the
      # X11 root). Smaller wine_desktop also makes the Hyprland
      # fullscreen window rule cleaner — the X11 surface is exactly the
      # game's render target with no wasted area.
      width: 2560
      height: 1440
    # Wrap the gameplay session with a host-side Hyprland windowrule so
    # the wine virtual desktop (title "cmr2") opens fullscreen on the
    # current monitor. Honors whatever scale the user has configured —
    # Hyprland handles the upscale from the wine_desktop's 1440p X11
    # surface to physical pixels. `hyprctl reload` after the game exits
    # removes the temporary keyword override. NEVER add a monitor scale
    # override here: the user's scale=1.5 on DP-1 is intentional.
    host_pre_launch_commands:
      - hyprctl keyword windowrulev2 'fullscreen, title:^cmr2$' >/dev/null
    host_post_launch_commands:
      - hyprctl reload >/dev/null 2>&1
    # Defensive pin: this game broke during the May 2026 host upgrade
    # window (wine 11.8→11.9, mesa 26.0.5→.6, NVIDIA 595.58→.71, libdrm
    # 2.4.131→.133, vulkan-icd 1.4.341→.350). Once the wine_desktop
    # workaround above is in place, system wine 11.9 may also work —
    # this pin just keeps us on the wine version where it was last
    # verified end-to-end (intro + menu + race). Drop these two lines
    # to fall back to system Wine; the sidecar runner is still extracted
    # by the install_pc_racing role from dg_pc_racing_pinned_wine_runners.
    wine_binary: "{{ dg_pc_racing_wine_runner_root }}/wine-11.8/usr/bin/wine"
    wine_path: "{{ dg_pc_racing_wine_runner_root }}/wine-11.8/usr/bin:{{ dg_pc_racing_wine_path }}"
    patches:
      - name: silentpatch
        source: "{{ dg_pc_racing_cache_root }}/silentpatch_cmr2.zip"
        backup_exe: "CMR2.exe"
        creates: "SPCMR2.dll"
    ini:
      - file: "SPCMR2.ini"
        key: Region
        value: AMERICA
      - file: "SPCMR2.ini"
        key: Window
        value: "0"
      - file: "SPCMR2.ini"
        key: Borderless
        value: "0"
      # SilentPatch widescreen ceiling — wine_desktop matches. The
      # in-game picker still exposes 4K (wine virtual desktop renegotiates
      # against the X11 root), so the user can pick 4K from inside the
      # game; SPCMR2 honors that at runtime regardless of the .ini values
      # here, which only set the initial state.
      - file: "SPCMR2.ini"
        key: Width
        value: "2560"
      - file: "SPCMR2.ini"
        key: Height
        value: "1440"
    winebus_registry:
      - name: Map Controllers
        value: 1
    env:
      - name: WINEDLLOVERRIDES
        value: "dinput=n,b"
    # gamescope on top of wine_desktop produces the same green/red/pink
    # solid-color symptom that bypassing gamescope entirely cured: the
    # Xwayland → gamescope → Wayland presentation path apparently can't
    # composite wine's X11 virtual-desktop window correctly. Run the
    # game directly under Hyprland — the 2560x1440 wine_desktop window
    # is comfortable on a 4K display; revisit 4K upscale later if
    # gamescope ever ships a fix or we find the right -w / -h shape.
    gamescope_enabled: false
    xidi:
      # CMR2 is DirectInput 7-era (no DX8) so the wrapper is dinput.dll,
      # not dinput8.dll like CMR3/CMR04. Without Xidi the in-game
      # controller options page lists the 8BitDo but greys most rows
      # out — modern controllers don't pass the partial DI7 device-type
      # checks the game does. StandardGamepad template gives CMR2 a
      # full virtual DI joystick and re-enables the options.
      source: "{{ dg_pc_racing_xidi_archive }}"
      url: "{{ dg_pc_racing_xidi_url }}"
      archive_root: "Xidi-{{ dg_pc_racing_xidi_version }}"
      architecture: Win32
      wrappers:
        - dinput.dll
      config: |
        [Mapper]
        Type = CMR2Gamepad

        [CustomMapper:CMR2Gamepad]
        Template = StandardGamepad
        StickLeftX = Axis(X)
        StickLeftY = Null
        TriggerRT = Axis(Y, -)
        TriggerLT = Axis(Y, +)
        DpadUp = Keyboard(UpArrow)
        DpadDown = Keyboard(DownArrow)
        DpadLeft = Keyboard(LeftArrow)
        DpadRight = Keyboard(RightArrow)
        ButtonStart = Keyboard(Enter)
        ButtonBack = Keyboard(Esc)

        [Properties]
        UseBuiltInProperties = yes
        DeadzonePercentStickLeft = 5
        DeadzonePercentStickRight = 5
        DeadzonePercentTriggerLT = 0
        DeadzonePercentTriggerRT = 0
        SaturationPercentStickLeft = 100
        SaturationPercentStickRight = 100
        SaturationPercentTriggerLT = 100
        SaturationPercentTriggerRT = 100

        [Log]
        Enabled = no
        Level = 1

        [Import]
        dinput.dll = C:\Windows\system32\dinput.dll

        [Workarounds]
        ActiveVirtualControllerMask = 0x01
    notes: "Source is a pre-extracted copy of the original BIN/CUE media; the converted ISO is kept beside it. Xidi is required for the controller options page to ungrey: CMR2's DirectInput 7 controller-class detection rejects modern gamepads' partial subtype reports, so Xidi presents a virtual StandardGamepad-derived DI device and the menu re-enables analog binding rows. CMR2 only binds throttle/brake to the virtual left-stick Y axis (no native trigger axes in DI7), so the mapper sends physical RT to Y- (throttle) and physical LT to Y+ (brake) and silences physical left-stick Y to avoid accidental throttle on steering."

  - slug: colin-mcrae-rally-3
    name: "Colin McRae Rally 3"
    install_mode: installer
    source_dir: "{{ dg_pc_racing_source_root }}/Colin-McRae-Rally-3_Win_EN-FR-DE-IT-ES-PL-CS_Repack"
    installer: "Colin McRae Rally 3_Repack_v4_Setup.exe"
    install_args:
      - /VERYSILENT
      - /SUPPRESSMSGBOXES
      - /NORESTART
      - /SP-
      - "/DIR=G:\\colin-mcrae-rally-3"
    launch_exe: "Rally_3PC.exe"
    installed_path: "{{ dg_pc_racing_install_root }}/colin-mcrae-rally-3"
    winebus_registry:
      - name: Map Controllers
        value: 1
    gamescope_enabled: true
    gamescope_game_width: "{{ dg_pc_racing_gamescope_width }}"
    gamescope_game_height: "{{ dg_pc_racing_gamescope_height }}"
    gamescope_output_width: "{{ dg_pc_racing_gamescope_width }}"
    gamescope_output_height: "{{ dg_pc_racing_gamescope_height }}"
    env:
      - name: WINEDLLOVERRIDES
        value: "dinput8,dsound,d3d9=n,b"
    xidi:
      source: "{{ dg_pc_racing_xidi_archive }}"
      url: "{{ dg_pc_racing_xidi_url }}"
      archive_root: "Xidi-{{ dg_pc_racing_xidi_version }}"
      architecture: Win32
      wrappers:
        - dinput8.dll
      preserve_as_proxy:
        source: dinput8.dll
        dest: dsound.dll
      config: |
        [Mapper]
        Type = CMR3Gamepad

        [CustomMapper:CMR3Gamepad]
        Template = StandardGamepad
        StickLeftX = Axis(X)
        StickLeftY = Null
        TriggerRT = Axis(Y, -)
        TriggerLT = Axis(Y, +)
        DpadUp = Keyboard(UpArrow)
        DpadDown = Keyboard(DownArrow)
        DpadLeft = Keyboard(LeftArrow)
        DpadRight = Keyboard(RightArrow)
        ButtonStart = Keyboard(Enter)
        ButtonBack = Keyboard(Esc)

        [Properties]
        UseBuiltInProperties = yes
        DeadzonePercentStickLeft = 5
        DeadzonePercentStickRight = 5
        DeadzonePercentTriggerLT = 0
        DeadzonePercentTriggerRT = 0
        SaturationPercentStickLeft = 100
        SaturationPercentStickRight = 100
        SaturationPercentTriggerLT = 100
        SaturationPercentTriggerRT = 100

        [Log]
        Enabled = no
        Level = 1

        [Import]
        dinput8.dll = C:\Windows\system32\dinput8.dll

        [Workarounds]
        ActiveVirtualControllerMask = 0x01
    notes: "Magipack Inno Setup repack installed silently to G:\\colin-mcrae-rally-3. The repack notes state patch 1.1, SilentPatch v2.1, language pack, HD UI, and dgVoodoo D3D9 support are already included. Gamescope pins output to the configured 4K monitor. Xidi provides a local DirectInput compatibility layer: RT/LT are mapped to the virtual left-stick Y axis because CMR3 binds accelerator/brake there, and physical left-stick Y is ignored to avoid accidental throttle. The bundled Ultimate ASI Loader is preserved as dsound.dll for SilentPatch."

  - slug: colin-mcrae-rally-04
    name: "Colin McRae Rally 04"
    playable_status: playable
    install_mode: installer
    source_dir: "{{ dg_pc_racing_source_root }}/Colin-McRae-Rally-04_Win_EN-FR-DE-ES-IT_Repack"
