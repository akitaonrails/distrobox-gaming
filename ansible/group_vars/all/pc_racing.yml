# Optional Windows PC racing games managed with system Wine inside the distrobox.

dg_pc_racing_source_root: "{{ dg_roms_final_root }}/PC"
dg_pc_racing_usb_root: "{{ dg_external_usb_games_root }}"
dg_pc_racing_install_root: "{{ dg_box_home }}/Games/pc-racing"
dg_pc_racing_prefix_root: "{{ dg_box_home }}/wineprefixes/pc-racing"
dg_pc_racing_media_root: "{{ dg_box_home }}/tools/pc-racing/media"
dg_pc_racing_cache_root: "{{ dg_box_home }}/cache/pc-racing"
dg_pc_racing_wine_path: /usr/local/sbin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
dg_pc_racing_winearch: win64
dg_pc_racing_gamescope_enabled: true
dg_pc_racing_gamescope_width: 2560
dg_pc_racing_gamescope_height: 1440
dg_pc_racing_target_monitor_x: 2160
dg_pc_racing_target_monitor_y: 0
dg_pc_racing_gamepad_device: /dev/input/js0
dg_pc_racing_gamepad_only: "0x2dc8/0x310b"
dg_pc_racing_sdl_hidapi: "0"
dg_pc_racing_dinput_disabled_joysticks:
  - ZSA Technology Labs Moonlander Mark I
  - ZSA Technology Labs Moonlander Mark I System Control
  - ZSA Technology Labs Moonlander Mark I Consumer Control
  - ZSA Technology Labs Moonlander Mark I Keyboard
dg_pc_racing_winebus_registry:
  - name: DisableHidraw
    value: 1
  - name: DisableInput
    value: 1
  - name: Enable SDL
    value: 1
  - name: Map Controllers
    value: 0
dg_pc_racing_run_installers: false
dg_pc_racing_copy_unpacked: true
dg_pc_racing_export_desktop: false
dg_pc_racing_selected_slugs: []
dg_pc_racing_cleanup_legacy: true

dg_pc_racing_legacy_packages:
  - lutris
  - umu-launcher

dg_pc_racing_legacy_paths:
  - "{{ dg_box_home }}/.cache/lutris"
  - "{{ dg_box_home }}/.cache/umu"
  - "{{ dg_box_home }}/.cache/umu-protonfixes"
  - "{{ dg_box_home }}/.config/lutris"
  - "{{ dg_box_home }}/.local/share/lutris"
  - "{{ dg_box_home }}/.local/share/umu"
  - "{{ dg_box_home }}/cache/pc-racing/lutris-runners"

dg_pc_racing_packages:
  - wine
  - winetricks
  - wine-mono
  - wine-gecko
  - sdl2
  - gamescope
  - joyutils
  - p7zip
  - rsync

dg_pc_racing_games:
  - slug: colin-mcrae-rally-2
    name: "Colin McRae Rally 2.0"
    install_mode: installer
    source_dir: "{{ dg_pc_racing_source_root }}/Colin-McRae-Rally-2-0_Win_EN-FR-ES_US_CD_Extracted"
    installer: Setup.exe
    install_args: []
    launch_exe: "CMR2.exe"
    installed_path: "{{ dg_pc_racing_prefix_root }}/colin-mcrae-rally-2/drive_c/Program Files (x86)/Codemasters/Colin McRae Rally 2"
    patches:
      - name: silentpatch
        source: "{{ dg_pc_racing_cache_root }}/silentpatch_cmr2.zip"
        backup_exe: "CMR2.exe"
        creates: "SPCMR2.dll"
    ini:
      - file: "SPCMR2.ini"
        key: Region
        value: AMERICA
      - file: "SPCMR2.ini"
        key: Window
        value: "0"
      - file: "SPCMR2.ini"
        key: Borderless
        value: "0"
    notes: "Source is a pre-extracted copy of the original BIN/CUE media; the converted ISO is kept beside it."

  - slug: outrun-2006
    name: "OutRun 2006: Coast 2 Coast"
    install_mode: installer
    source_dir: "{{ dg_pc_racing_source_root }}/OutRun-2006-Coast-2-Coast_Win_EN-FR-DE-IT-ES_Repack"
    installer: "OutRun 2006 - Coast 2 Coast_Repack_Setup.exe"
    install_args:
      - /VERYSILENT
      - /SUPPRESSMSGBOXES
      - /NORESTART
      - /SP-
      - "/DIR=G:\\outrun-2006"
    launch_exe: "OR2006C2C.exe"
    installed_path: "{{ dg_pc_racing_install_root }}/outrun-2006"
    winetricks_components:
      - vcrun2022
      - dxvk
    env:
      - name: WINEDLLOVERRIDES
        value: "dinput8=n,b;d3d9=n,b"
    gamescope_enabled: false
    disabled_files:
      - d3d9.dll
      - d3d9.ini
    patches:
      - name: OutRun2006Tweaks
        url: https://github.com/emoose/OutRun2006Tweaks/releases/download/v0.6.1/OutRun2006Tweaks-0.6.1.zip
        source: "{{ dg_pc_racing_cache_root }}/OutRun2006Tweaks-0.6.1.zip"
        backup_exe: "OR2006C2C.exe"
        creates: "OutRun2006Tweaks.ini"
    ini:
      - file: "outrun2006.ini"
        key: "DX/RES/WIDTH"
        value: "2560"
        separator: " = "
      - file: "outrun2006.ini"
        key: "DX/RES/HEIGHT"
        value: "1440"
        separator: " = "
      - file: "outrun2006.ini"
        key: "DX/ANTIALIASING"
        value: "0"
        separator: " = "
      - file: "outrun2006.ini"
        key: "DX/WINDOWED"
        value: "1"
        separator: " = "
      - file: "OutRun2006Tweaks.ini"
        key: AutoDetectResolution
        value: "false"
      - file: "OutRun2006Tweaks.ini"
        key: WindowedBorderless
        value: "true"
      - file: "OutRun2006Tweaks.ini"
        key: WindowPositionX
        value: "{{ dg_pc_racing_target_monitor_x }}"
        separator: " = "
      - file: "OutRun2006Tweaks.ini"
        key: WindowPositionY
        value: "{{ dg_pc_racing_target_monitor_y }}"
        separator: " = "
    notes: "Inno Setup repack installed silently to G:\\outrun-2006. OutRun2006Tweaks replaces the DRM-sensitive EXE and must load through native dinput8. The bundled SpecialK d3d9 files are backed up and disabled so prefix DXVK can provide D3D9."

  - slug: sega-rally-revo
    name: "Sega Rally Revo"
    install_mode: copy
    source_dir: "{{ dg_pc_racing_source_root }}/SEGA-Rally-Revo_Win_EN-FR-DE-ES-IT-PL_Full-Rip/Sega Rally"
    launch_exe: "SEGA Rally.exe"
    installed_path: "{{ dg_pc_racing_install_root }}/sega-rally-revo"
    winetricks_components:
      - directplay
      - d3dx9
      - dxvk
    registry_values:
      - key: "HKEY_LOCAL_MACHINE\\SOFTWARE\\WOW6432Node\\Sega\\SEGA Rally"
        name: installdir
        value: "G:\\sega-rally-revo"
      - key: "HKEY_LOCAL_MACHINE\\SOFTWARE\\WOW6432Node\\Sega\\SEGA Rally"
        name: sku
        value: Europe
      - key: "HKEY_LOCAL_MACHINE\\SOFTWARE\\WOW6432Node\\Sega\\SEGA Rally"
        name: language
        value: English
    documents_config_files:
      - path: "SEGA Rally/Saved Games/config.ini"
        content: |
          [Audio]
          DriverGUID=00000000-0000-0000-0000-000000000000
          Quality=3
          SoftwareEmulation=0

          [GameController]
          GUID=
          Mapping=000100010000000100000000-0000-0000-0000-0000000000000000000E000F001200130014000200030017001800010000

          [Graphics]
          AdapterOrdinal=0
          RenderDevice=Hardware
          AdapterFormat=X8R8G8B8
          HorizontalResolution=2560
          VerticalResolution=1440
          ResolutionFilter=1
          BackBufferFormat=A8R8G8B8
          DepthStencilFormat=D24S8
          AntiAliasingLevel=0
          MultisampleType=0
          MultisampleQuality=0
          GraphicQuality=3
          ShadowQuality=2
          ReflectionQuality=2
          TrackQuality=3
          TextureQuality=2
          ShaderQuality=1
          DrawDistanceQuality=2
          ParticleQuality=2
          RearViewMirrorQuality=2
          MudQuality=1
          VSync=1
          ShaderVersion=3
          RunWindowed=0
          RefreshRate=60
    notes: "Full-rip payload copied directly from ROMS_FINAL. Registry values replace the shipped SEGA Rally.reg, and config.ini is seeded directly because the .NET launcher UI is unreliable under Wine."
