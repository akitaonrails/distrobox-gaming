    launch_exe: "cmr4.exe"
    installed_path: "{{ dg_pc_racing_install_root }}/colin-mcrae-rally-04"
    winebus_registry:
      - name: Map Controllers
        value: 1
    winetricks_components:
      - dxvk
    gamescope_enabled: true
    gamescope_game_width: 2880
    gamescope_game_height: 2160
    gamescope_output_width: "{{ dg_pc_racing_gamescope_width }}"
    gamescope_output_height: "{{ dg_pc_racing_gamescope_height }}"
    gamescope_scaler: fit
    gamescope_filter: nis
    registry_values:
      - key: "HKEY_LOCAL_MACHINE\\Software\\Wow6432Node\\Codemasters\\Colin McRae Rally 04"
        name: Width
        type: REG_DWORD
        value: "2880"
      - key: "HKEY_LOCAL_MACHINE\\Software\\Wow6432Node\\Codemasters\\Colin McRae Rally 04"
        name: Height
        type: REG_DWORD
        value: "2160"
    env:
      - name: WINEDLLOVERRIDES
        value: "dinput8,dsound,d3d8,d3d9=n,b"
    xidi:
      source: "{{ dg_pc_racing_xidi_archive }}"
      url: "{{ dg_pc_racing_xidi_url }}"
      archive_root: "Xidi-{{ dg_pc_racing_xidi_version }}"
      architecture: Win32
      wrappers:
        - dinput8.dll
      preserve_as_proxy:
        source: dinput8.dll
        dest: dsound.dll
      config: |
        [Mapper]
        Type = CMR04Gamepad

        [CustomMapper:CMR04Gamepad]
        Template = StandardGamepad
        StickLeftX = Split( Keyboard(RightArrow), Keyboard(LeftArrow) )
        StickLeftY = Split( Keyboard(DownArrow), Keyboard(UpArrow) )
        TriggerRT = Keyboard(UpArrow)
        TriggerLT = Keyboard(DownArrow)
        DpadUp = Keyboard(UpArrow)
        DpadDown = Keyboard(DownArrow)
        DpadLeft = Keyboard(LeftArrow)
        DpadRight = Keyboard(RightArrow)
        ButtonA = Keyboard(Enter)
        ButtonB = Keyboard(Esc)
        ButtonX = Keyboard(Space)
        ButtonY = Keyboard(C)
        ButtonStart = Keyboard(Enter)
        ButtonBack = Keyboard(Esc)

        [Properties]
        UseBuiltInProperties = yes
        DeadzonePercentStickLeft = 5
        DeadzonePercentStickRight = 5
        DeadzonePercentTriggerLT = 0
        DeadzonePercentTriggerRT = 0
        SaturationPercentStickLeft = 100
        SaturationPercentStickRight = 100
        SaturationPercentTriggerLT = 100
        SaturationPercentTriggerRT = 100

        [Log]
        Enabled = no
        Level = 1

        [Import]
        dinput8.dll = C:\Windows\system32\dinput8.dll

        [Workarounds]
        ActiveVirtualControllerMask = 0x01
    notes: "PLAYABLE. Magipack Inno Setup repack installed silently to G:\\colin-mcrae-rally-04. CrossOver reports the DRM-free/budget edition running well with DXVK, while old PlayOnLinux notes warn that the original protected retail media does not run under Wine. The game registry is forced to 2880x2160 and gamescope exposes the same 4:3 nested display inside the configured 3840x2160 monitor to preserve aspect ratio without stretching horizontally. The 4:3 image is not perfectly centered on the monitor. Xidi is configured as a keyboard-emulation layer: d-pad and left stick emit arrows, RT accelerates, LT brakes, A/Start confirm, B/Back cancel, X maps to Space, and Y maps to C. If the 2004-era engine refuses to render at 2880x2160, fall back to 1920x1440 in both gamescope_game_* and the registry; gamescope will still scale the 4:3 nested display onto the 4K monitor."

