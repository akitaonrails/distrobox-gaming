# Optional Windows PC racing games managed with system Wine inside the distrobox.

dg_pc_racing_source_root: "{{ dg_roms_final_root }}/PC"
dg_pc_racing_usb_root: "{{ dg_external_usb_games_root }}"
dg_pc_racing_install_root: "{{ dg_box_home }}/Games/pc-racing"
dg_pc_racing_prefix_root: "{{ dg_box_home }}/wineprefixes/pc-racing"
dg_pc_racing_media_root: "{{ dg_box_home }}/tools/pc-racing/media"
dg_pc_racing_cache_root: "{{ dg_box_home }}/cache/pc-racing"
dg_pc_racing_directx_jun2010_redist: "{{ dg_pc_racing_source_root }}/Project 06 - Silver Release (Patch v1.45)/Sonic the Hedgehog (P-06)/Redist/directx_Jun2010_redist.exe"
dg_pc_racing_xidi_version: v4.3.1
dg_pc_racing_xidi_url: "https://github.com/samuelgr/Xidi/releases/download/{{ dg_pc_racing_xidi_version }}/Xidi-{{ dg_pc_racing_xidi_version }}.zip"
dg_pc_racing_xidi_archive: "{{ dg_pc_racing_cache_root }}/Xidi-{{ dg_pc_racing_xidi_version }}.zip"
dg_pc_racing_wine_path: /usr/local/sbin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
dg_pc_racing_winearch: win64
dg_pc_racing_gamescope_enabled: true
dg_pc_racing_gamescope_width: 2560
dg_pc_racing_gamescope_height: 1440
dg_pc_racing_target_monitor_x: 2160
dg_pc_racing_target_monitor_y: 0
dg_pc_racing_gamepad_device: /dev/input/js0
dg_pc_racing_gamepad_only: "0x2dc8/0x310b"
dg_pc_racing_sdl_hidapi: "0"
dg_pc_racing_dinput_disabled_joysticks:
  - ZSA Technology Labs Moonlander Mark I
  - ZSA Technology Labs Moonlander Mark I System Control
  - ZSA Technology Labs Moonlander Mark I Consumer Control
  - ZSA Technology Labs Moonlander Mark I Keyboard
dg_pc_racing_winebus_registry:
  - name: DisableHidraw
    value: 1
  - name: DisableInput
    value: 1
  - name: Enable SDL
    value: 1
  - name: Map Controllers
    value: 0
dg_pc_racing_run_installers: false
dg_pc_racing_copy_unpacked: true
dg_pc_racing_export_desktop: false
dg_pc_racing_selected_slugs: []
dg_pc_racing_cleanup_legacy: true

dg_pc_racing_legacy_packages:
  - lutris
  - umu-launcher

dg_pc_racing_legacy_paths:
  - "{{ dg_box_home }}/.cache/lutris"
  - "{{ dg_box_home }}/.cache/umu"
  - "{{ dg_box_home }}/.cache/umu-protonfixes"
  - "{{ dg_box_home }}/.config/lutris"
  - "{{ dg_box_home }}/.local/share/lutris"
  - "{{ dg_box_home }}/.local/share/umu"
  - "{{ dg_box_home }}/cache/pc-racing/lutris-runners"

dg_pc_racing_packages:
  - wine
  - winetricks
  - wine-mono
  - wine-gecko
  - sdl2
  - gamescope
  - joyutils
  - p7zip
  - rsync

dg_pc_racing_games:
  - slug: colin-mcrae-rally-2
    name: "Colin McRae Rally 2.0"
    install_mode: installer
    source_dir: "{{ dg_pc_racing_source_root }}/Colin-McRae-Rally-2-0_Win_EN-FR-ES_US_CD_Extracted"
    installer: Setup.exe
    install_args: []
    launch_exe: "CMR2.exe"
    installed_path: "{{ dg_pc_racing_prefix_root }}/colin-mcrae-rally-2/drive_c/Program Files (x86)/Codemasters/Colin McRae Rally 2"
    patches:
      - name: silentpatch
        source: "{{ dg_pc_racing_cache_root }}/silentpatch_cmr2.zip"
        backup_exe: "CMR2.exe"
        creates: "SPCMR2.dll"
    ini:
      - file: "SPCMR2.ini"
        key: Region
        value: AMERICA
      - file: "SPCMR2.ini"
        key: Window
        value: "0"
      - file: "SPCMR2.ini"
        key: Borderless
        value: "0"
    notes: "Source is a pre-extracted copy of the original BIN/CUE media; the converted ISO is kept beside it."

  - slug: colin-mcrae-rally-3
    name: "Colin McRae Rally 3"
    install_mode: installer
    source_dir: "{{ dg_pc_racing_source_root }}/Colin-McRae-Rally-3_Win_EN-FR-DE-IT-ES-PL-CS_Repack"
    installer: "Colin McRae Rally 3_Repack_v4_Setup.exe"
    install_args:
      - /VERYSILENT
      - /SUPPRESSMSGBOXES
      - /NORESTART
      - /SP-
      - "/DIR=G:\\colin-mcrae-rally-3"
    launch_exe: "Rally_3PC.exe"
    installed_path: "{{ dg_pc_racing_install_root }}/colin-mcrae-rally-3"
    winebus_registry:
      - name: Map Controllers
        value: 1
    gamescope_enabled: true
    gamescope_game_width: "{{ dg_pc_racing_gamescope_width }}"
    gamescope_game_height: "{{ dg_pc_racing_gamescope_height }}"
    gamescope_output_width: "{{ dg_pc_racing_gamescope_width }}"
    gamescope_output_height: "{{ dg_pc_racing_gamescope_height }}"
    env:
      - name: WINEDLLOVERRIDES
        value: "dinput8,dsound,d3d9=n,b"
    xidi:
      source: "{{ dg_pc_racing_xidi_archive }}"
      url: "{{ dg_pc_racing_xidi_url }}"
      archive_root: "Xidi-{{ dg_pc_racing_xidi_version }}"
      architecture: Win32
      wrappers:
        - dinput8.dll
      preserve_as_proxy:
        source: dinput8.dll
        dest: dsound.dll
      config: |
        [Mapper]
        Type = CMR3Gamepad

        [CustomMapper:CMR3Gamepad]
        Template = StandardGamepad
        StickLeftX = Axis(X)
        StickLeftY = Null
        TriggerRT = Axis(Y, -)
        TriggerLT = Axis(Y, +)
        DpadUp = Keyboard(UpArrow)
        DpadDown = Keyboard(DownArrow)
        DpadLeft = Keyboard(LeftArrow)
        DpadRight = Keyboard(RightArrow)
        ButtonStart = Keyboard(Enter)
        ButtonBack = Keyboard(Esc)

        [Properties]
        UseBuiltInProperties = yes
        DeadzonePercentStickLeft = 5
        DeadzonePercentStickRight = 5
        DeadzonePercentTriggerLT = 0
        DeadzonePercentTriggerRT = 0
        SaturationPercentStickLeft = 100
        SaturationPercentStickRight = 100
        SaturationPercentTriggerLT = 100
        SaturationPercentTriggerRT = 100

        [Log]
        Enabled = no
        Level = 1

        [Import]
        dinput8.dll = C:\Windows\system32\dinput8.dll

        [Workarounds]
        ActiveVirtualControllerMask = 0x01
    notes: "Magipack Inno Setup repack installed silently to G:\\colin-mcrae-rally-3. The repack notes state patch 1.1, SilentPatch v2.1, language pack, HD UI, and dgVoodoo D3D9 support are already included. Gamescope pins output to the configured 1440p monitor. Xidi provides a local DirectInput compatibility layer: RT/LT are mapped to the virtual left-stick Y axis because CMR3 binds accelerator/brake there, and physical left-stick Y is ignored to avoid accidental throttle. The bundled Ultimate ASI Loader is preserved as dsound.dll for SilentPatch."

  - slug: outrun-2006
    name: "OutRun 2006: Coast 2 Coast"
    install_mode: installer
    source_dir: "{{ dg_pc_racing_source_root }}/OutRun-2006-Coast-2-Coast_Win_EN-FR-DE-IT-ES_Repack"
    installer: "OutRun 2006 - Coast 2 Coast_Repack_Setup.exe"
    install_args:
      - /VERYSILENT
      - /SUPPRESSMSGBOXES
      - /NORESTART
      - /SP-
      - "/DIR=G:\\outrun-2006"
    launch_exe: "OR2006C2C.exe"
    installed_path: "{{ dg_pc_racing_install_root }}/outrun-2006"
    winetricks_components:
      - vcrun2022
      - dxvk
    env:
      - name: WINEDLLOVERRIDES
        value: "dinput8=n,b;d3d9=n,b"
    gamescope_enabled: false
    disabled_files:
      - d3d9.dll
      - d3d9.ini
    patches:
      - name: OutRun2006Tweaks
        url: https://github.com/emoose/OutRun2006Tweaks/releases/download/v0.6.1/OutRun2006Tweaks-0.6.1.zip
        source: "{{ dg_pc_racing_cache_root }}/OutRun2006Tweaks-0.6.1.zip"
        backup_exe: "OR2006C2C.exe"
        creates: "OutRun2006Tweaks.ini"
    ini:
      - file: "outrun2006.ini"
        key: "DX/RES/WIDTH"
        value: "2560"
        separator: " = "
      - file: "outrun2006.ini"
        key: "DX/RES/HEIGHT"
        value: "1440"
        separator: " = "
      - file: "outrun2006.ini"
        key: "DX/ANTIALIASING"
        value: "0"
        separator: " = "
      - file: "outrun2006.ini"
        key: "DX/WINDOWED"
        value: "1"
        separator: " = "
      - file: "OutRun2006Tweaks.ini"
        key: AutoDetectResolution
        value: "false"
      - file: "OutRun2006Tweaks.ini"
        key: WindowedBorderless
        value: "true"
      - file: "OutRun2006Tweaks.ini"
        key: WindowPositionX
        value: "{{ dg_pc_racing_target_monitor_x }}"
        separator: " = "
      - file: "OutRun2006Tweaks.ini"
        key: WindowPositionY
        value: "{{ dg_pc_racing_target_monitor_y }}"
        separator: " = "
    notes: "Inno Setup repack installed silently to G:\\outrun-2006. OutRun2006Tweaks replaces the DRM-sensitive EXE and must load through native dinput8. The bundled SpecialK d3d9 files are backed up and disabled so prefix DXVK can provide D3D9."

  - slug: sega-rally-revo
    name: "Sega Rally Revo"
    install_mode: copy
    source_dir: "{{ dg_pc_racing_source_root }}/SEGA-Rally-Revo_Win_EN-FR-DE-ES-IT-PL_Full-Rip/Sega Rally"
    launch_exe: "SEGA Rally.exe"
    installed_path: "{{ dg_pc_racing_install_root }}/sega-rally-revo"
    disabled_files:
      - "Bootup/video/Rally/SEGA_Logo720p.wmv"
      - "Bootup/video/Rally/SRS_Logo_1.wmv"
    winetricks_components:
      - directplay
      - d3dx9
      - dxvk
    directx_redists:
      - name: directx-jun2010
        source: "{{ dg_pc_racing_directx_jun2010_redist }}"
    winebus_registry:
      - name: Map Controllers
        value: 1
    registry_values:
      - key: "HKEY_LOCAL_MACHINE\\SOFTWARE\\WOW6432Node\\Sega\\SEGA Rally"
        name: installdir
        value: "G:\\sega-rally-revo"
      - key: "HKEY_LOCAL_MACHINE\\SOFTWARE\\WOW6432Node\\Sega\\SEGA Rally"
        name: sku
        value: Europe
      - key: "HKEY_LOCAL_MACHINE\\SOFTWARE\\WOW6432Node\\Sega\\SEGA Rally"
        name: language
        value: English
    documents_config_files:
      - path: "SEGA Rally/Saved Games/config.ini"
        force: false
        content: |
          [Audio]
          DriverGUID=00000000-0000-0000-0000-000000000000
          Quality=3
          SoftwareEmulation=0

          [GameController]
          GUID=
          Mapping=000100010000000100000000-0000-0000-0000-0000000000000000000E000F001200130014000200030017001800010000

          [Graphics]
          AdapterOrdinal=0
          RenderDevice=Hardware
          AdapterFormat=X8R8G8B8
          HorizontalResolution=2560
          VerticalResolution=1440
          ResolutionFilter=1
          BackBufferFormat=A8R8G8B8
          DepthStencilFormat=D24S8
          AntiAliasingLevel=0
          MultisampleType=0
          MultisampleQuality=0
          GraphicQuality=3
          ShadowQuality=2
          ReflectionQuality=2
          TrackQuality=3
          TextureQuality=2
          ShaderQuality=1
          DrawDistanceQuality=2
          ParticleQuality=2
          RearViewMirrorQuality=2
          MudQuality=1
          VSync=1
          ShaderVersion=3
          RunWindowed=0
          RefreshRate=60
    prefix_directories:
      - "drive_c/users/Public/Documents/SEGA Rally/Shared Data/Ghosts"
      - "drive_c/users/Public/Documents/SEGA Rally/Shared Data/Rank Table"
    prefix_files:
      - path: "drive_c/users/{{ ansible_facts.user_id }}/Documents/SEGA Rally/Saved Games/SEGA Rally.dat"
        force: false
      - path: "drive_c/users/Public/Documents/SEGA Rally/Shared Data/Rank Table/SR_RANKTABLES.DAT"
        force: false
    notes: "Full-rip payload copied directly from ROMS_FINAL. Registry values replace the shipped SEGA Rally.reg, and config.ini is seeded directly because the .NET launcher UI is unreliable under Wine."

  - slug: sega-rally-2
    name: "Sega Rally 2: 25th Anniversary Edition"
    install_mode: installer
    source_dir: "{{ dg_pc_racing_source_root }}/Sega-Rally-2-Championship_Win_EN-ES_25th-Anniversary-Edition-by-OldNewPixel"
    installer: "Sega Rally 2 25th Anniversary.exe"
    install_args:
      - /VERYSILENT
      - /SUPPRESSMSGBOXES
      - /NORESTART
      - /SP-
      - "/DIR=G:\\sega-rally-2"
    launch_exe: "SEGA RALLY 2.exe"
    installed_path: "{{ dg_pc_racing_install_root }}/sega-rally-2"
    winebus_registry:
      - name: Map Controllers
        value: 0
    registry_values:
      - key: "HKEY_LOCAL_MACHINE\\Software\\Wow6432Node\\Sega\\SEGA RALLY 2\\ControlPanel\\Profiles\\0"
        name: nDeviceType
        type: REG_BINARY
        value: "07000000"
      - key: "HKEY_LOCAL_MACHINE\\Software\\Wow6432Node\\Sega\\SEGA RALLY 2\\InputSettings"
        name: "0"
        value: "7"
    gamescope_game_width: 800
    gamescope_game_height: 600
    gamescope_output_width: "{{ dg_pc_racing_gamescope_width }}"
    gamescope_output_height: "{{ dg_pc_racing_gamescope_height }}"
    gamescope_scaler: fit
    gamescope_filter: linear
    env:
      - name: WINEDLLOVERRIDES
        value: "ddraw,d3dimm,dxgi,dinput=n,b"
    patches:
      - name: Xidi XInput fallback
        source: "{{ dg_pc_racing_cache_root }}/sega-rally-2-xinput-fallback.zip"
        cache_from_pattern: "Troubleshooting/If XInput gamepad doesn*work.zip"
        creates: "dinput8.dll"
        extract_flat: true
        backup_files:
          - dinput.dll
    config_blocks:
      - name: xidi-trigger-keyboard-fallback
        file: Xidi.ini
        marker: "; {mark} distrobox-gaming xidi trigger keyboard fallback"
        state: absent
        block: ""
    notes: "OldNewPixel Inno Setup package installed silently to G:\\sega-rally-2. The game renders internally at 800x600, so gamescope scales it to the configured 1440p output while preserving 4:3 aspect ratio."
