  - slug: sega-rally-2
    name: "Sega Rally 2: 25th Anniversary Edition"
    install_mode: installer
    source_archive: "{{ dg_pc_racing_source_root }}/Sega Rally 2 ~ 25th Anniversary Edition 1.9.0.7z"
    source_dir: "{{ dg_pc_racing_cache_root }}/sega-rally-2-25th-anniversary-1.9.0"
    installer: "Sega Rally 2 ~ 25th Anniversary Edition 1.9.0.exe"
    # The 1.9.0 installer exposes the widescreen choice only through its custom
    # UI. Run the focused installer interactively and select 16:9 widescreen.
    install_args:
      - "/DIR=G:\\sega-rally-2"
    launch_exe: "SEGA RALLY 2 WIDESCREEN.exe"
    installed_path: "{{ dg_pc_racing_install_root }}/sega-rally-2"
    winebus_registry:
      - name: DisableInput
        value: 0
      - name: Map Controllers
        value: 0
    # Force SR2 to recognise the controller as a Logitech WingMan
    # Formula Force wheel (type 0A in SpecialProducts) — that device
    # type has SR2 read analog axes for steering / gas / brake instead
    # of the Saturn-pad (07) digital-only mapping which leaves the
    # 8BitDo's triggers inert. Xidi's CustomMapper below presents the
    # XInput gamepad as that virtual DI7 wheel: left-stick → X axis,
    # RT → Y- (throttle), LT → Y+ (brake).
    registry_values:
      - key: "HKEY_LOCAL_MACHINE\\Software\\Wow6432Node\\Sega\\SEGA RALLY 2\\ControlPanel\\Profiles\\0"
        name: nDeviceType
        type: REG_BINARY
        value: "0A000000"
      - key: "HKEY_LOCAL_MACHINE\\Software\\Wow6432Node\\Sega\\SEGA RALLY 2\\InputSettings"
        name: "0"
        value: "10"
    # The 1.9.0 widescreen installer adds AuToMaNiAk005's 16:9 launcher and
    # makes dgVoodoo enumerate 1067x600. Expose that exact nested mode so the
    # widescreen image scales evenly to the configured 16:9 output.
    gamescope_game_width: 1067
    gamescope_game_height: 600
    gamescope_output_width: "{{ dg_pc_racing_gamescope_width }}"
    gamescope_output_height: "{{ dg_pc_racing_gamescope_height }}"
    gamescope_scaler: fit
    gamescope_filter: linear
    env:
      - name: WINEDLLOVERRIDES
        value: "ddraw,d3dimm=n,b"
    patches:
      - name: dgvoodoo-2.79.3-linux
        source: "{{ dg_pc_racing_cache_root }}/sega-rally-2-dgVoodoo2_79_3.zip"
        cache_from_pattern: "Troubleshooting/Linux/dgVoodoo2_79_3.zip"
        creates: ".dg-dgvoodoo-2.79.3"
        backup_files:
          - "D3DImm.dll"
          - "MUSASHI/DDraw.dll"
          - "dgVoodooCpl.exe"
        post_extract_moves:
          - source: "MS/x86/D3DImm.dll"
            dest: "D3DImm.dll"
          - source: "MS/x86/DDraw.dll"
            dest: "MUSASHI/DDraw.dll"
    disabled_files:
      - "dinput.dll"
      - "dinput8.dll"
      - "MUSASHI/dinput.dll"
      - "DDraw.dll"
      - "dxgi.dll"
      - "_inmmserv.exe"
    notes: "OldNewPixel 1.9.0 must be installed interactively from the 7z-staged installer: choose 16:9 widescreen so SEGA RALLY 2 WIDESCREEN.exe is created. The launcher runs that widescreen executable at the repack's 1067x600 16:9 mode and lets gamescope scale it to the configured output. Disable the 1.9.0 Dinputto8/Xidi shims and ReShade dxgi.dll on Linux; the 8BitDo can crash the widescreen launcher in mginput/early swapchain setup. Use the bundled Linux dgVoodoo 2.79.3 fallback for DirectDraw. Keep Wine input enabled but Map Controllers off so basic DirectInput can see keyboard/controller input without Wine's SDL mapper."

  # Sister entry for the classic 4:3 launcher. Shares the same install
  # dir and Wine prefix with the widescreen slug above — the install
  # already exists, the patches/disabled-files/registry edits are
  # idempotent, and SEGA RALLY 2.EXE is the original 1999 launcher
  # that the 1.9.0 installer keeps alongside the widescreen wrapper.
  # Useful when the widescreen launcher misbehaves (exits silently
  # after the title chime) so we can fall back to the 4:3 build
  # without reinstalling.
  - slug: sega-rally-2-4x3
    name: "Sega Rally 2: 25th Anniversary Edition (4:3 classic)"
    install_mode: installer
    source_archive: "{{ dg_pc_racing_source_root }}/Sega Rally 2 ~ 25th Anniversary Edition 1.9.0.7z"
    source_dir: "{{ dg_pc_racing_cache_root }}/sega-rally-2-25th-anniversary-1.9.0"
    installer: "Sega Rally 2 ~ 25th Anniversary Edition 1.9.0.exe"
    install_args:
      - "/DIR=G:\\sega-rally-2"
    launch_exe: "SEGA RALLY 2.EXE"
    # Both slugs point at the same install + prefix — registry, DLL
    # overrides, dgVoodoo, and disabled-files all already applied by
    # the widescreen entry's playbook run. Re-running this slug is a
    # no-op apart from rendering the host launcher.
    installed_path: "{{ dg_pc_racing_install_root }}/sega-rally-2"
    prefix_path: "{{ dg_pc_racing_prefix_root }}/sega-rally-2"
    winebus_registry:
      - name: DisableInput
        value: 0
      - name: Map Controllers
        value: 0
    # 4:3 800x600 → gamescope upscale to the configured 4K output,
    # pillarboxed on a 16:9 monitor (preserves aspect ratio).
    gamescope_game_width: 800
    gamescope_game_height: 600
    gamescope_output_width: "{{ dg_pc_racing_gamescope_width }}"
    gamescope_output_height: "{{ dg_pc_racing_gamescope_height }}"
    gamescope_scaler: fit
    gamescope_filter: linear
    env:
      - name: WINEDLLOVERRIDES
        value: "ddraw,d3dimm=n,b"
    notes: "Sibling of sega-rally-2 sharing the same install + Wine prefix. Launches SEGA RALLY 2.EXE (the original 1999 4:3 executable kept alongside AuToMaNiAk005's WIDESCREEN.exe in the 1.9.0 install). Use this when the widescreen launcher exits silently or you want classic aspect."
