dg_ship_of_harkinian_root: "{{ dg_box_home }}/tools/ship-of-harkinian"
dg_ship_of_harkinian_install_dir: "{{ dg_ship_of_harkinian_root }}/current"
dg_ship_of_harkinian_cache_dir: "{{ dg_ship_of_harkinian_root }}/cache"
dg_ship_of_harkinian_bin: "{{ dg_box_home }}/bin/ship-of-harkinian"

# Local ROM is byte-swapped (.n64 / v64 order). The role converts it to a
# canonical big-endian z64 copy in the install directory and verifies the
# Ocarina of Time USA Rev B (v1.2) SHA1 before launch.
dg_ship_of_harkinian_rom_source: "{{ dg_rom_mid_root }}/n64/Legend of Zelda, The - Ocarina of Time (USA) (Rev B).n64"
dg_ship_of_harkinian_rom_name: oot.z64
dg_ship_of_harkinian_rom_sha1: 41b3bdc48d98c48529219919015a1af22f5057c2

dg_ship_of_harkinian_install_id: "{{ dg_ship_of_harkinian_version }}-{{ dg_ship_of_harkinian_git_ref }}-{{ dg_ship_of_harkinian_asset_sha256 }}"
dg_ship_of_harkinian_rom_id: "{{ dg_ship_of_harkinian_rom_sha1 }}"
dg_ship_of_harkinian_hd_pack_id: "{{ dg_ship_of_harkinian_hd_pack_version }}-{{ dg_ship_of_harkinian_hd_pack_sha256 }}"

dg_ship_of_harkinian_pacman_packages:
  - unzip
  - p7zip
  - fuse2
  - zenity
