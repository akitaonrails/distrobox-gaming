dg_ship_of_harkinian_asset_url: "https://github.com/HarbourMasters/Shipwright/releases/download/{{ dg_ship_of_harkinian_version }}/{{ dg_ship_of_harkinian_asset_name }}"
dg_ship_of_harkinian_asset_sha256: f81cde8052142d6abbbaaffa70699d6748e4cde3f158be8f268c3aab338ee315

dg_ship_of_harkinian_repo_url: https://github.com/HarbourMasters/Shipwright.git
dg_ship_of_harkinian_git_ref: cb71e22a79bc5d1f688fa881795bbd93094895fc

dg_ship_of_harkinian_hd_pack_version: v11.0.0
dg_ship_of_harkinian_hd_pack_name: oot-reloaded-v11.0.0-soh-o2r-hd.7z
dg_ship_of_harkinian_hd_pack_url: "https://github.com/GhostlyDark/OoT-Reloaded-SoH/releases/download/{{ dg_ship_of_harkinian_hd_pack_version }}/{{ dg_ship_of_harkinian_hd_pack_name }}"
