---
# Native Linux game ports (Feral Interactive, Aspyr, etc.) that run
# directly inside the gaming box with NO Wine. This is deliberately a
# separate catalog + role from install_pc_racing: native ports share
# none of the Wine machinery (no prefix, winetricks, winebus, DXVK) but
# do reuse the launcher / desktop / host-wrapper pattern. Adding a game
# is a data change here, same as the Wine racers.

# Steam "scout" runtime (ubuntu12_32) ships the old libraries that
# 2016-era Feral ports link against but modern Arch no longer provides:
# openssl 1.0 (libssl/libcrypto.so.1.0.0), libidn.so.11, librtmp.so.0,
# openldap 2.4 (liblber/libldap_r-2.4.so.2) and gconf (libgconf-2.so.4),
# all dragged in by the games' bundled libcurl/libcef. It appears once
# Steam + any "Steam Linux Runtime" have been installed on the host; the
# HOME path is bind-mounted into the box unchanged. Override in host_vars
# if Steam lives elsewhere.
dg_native_steam_runtime: "{{ ansible_facts.env.HOME }}/.local/share/Steam/ubuntu12_32/steam-runtime"

# Box-local directory of override symlinks (e.g. the modern system SDL2
# under a game's old bundled soname). Keeps us from mutating the pristine
# NAS game directories.
dg_native_overrides_root: "{{ dg_box_home }}/native-overrides"

dg_native_gamescope_width: 3840
dg_native_gamescope_height: 2160

# Restrict a run to specific slugs (empty = all).
dg_native_games_selected_slugs: []

dg_native_games:
  - slug: dirt-rally
    name: "DiRT Rally"
    # Feral Interactive Linux port (GoldMaster, Steam AppID 310560) with
    # the ACTiVATED crack (steam_appid.txt + activated.ini) so it needs
    # no running Steam client. Native OpenGL + native SDL controller
    # input — the Wine/DirectInput controller crash class that blocked
    # DiRT 3 cannot occur here. Runs in place from the NAS (41 GB; no
    # local copy, per the NAS-symlink preference).
    game_dir: "{{ dg_roms_final_root }}/PC/DiRT.Rally.Linux-ACTiVATED/DiRT.Rally"
    launch_script: DirtRally.sh          # Feral's generic launcher
    launch_binary: bin/DirtRally         # ELF — existence check
    lib_subdir: lib/x86_64
    steam_runtime: true
    # Bundled libSDL2-2.0.5.so is a 2016 build that predates good
    # 8BitDo/modern-pad support; override the exact soname with the box's
    # system SDL2 (full controller DB + hidapi) via a box-local symlink.
    sdl2_override: true
    sdl2_override_soname: libSDL2-2.0.5.so
    # Host it in gamescope at 4K: the existing Hyprland rule
    # (match:class .*gamescope.* -> fullscreen) then fullscreens it on a
    # direct/Walker launch with no per-class config, exactly like the
    # Wine racers. Flip to false in host_vars to run against Xwayland
    # directly if gamescope ever misbehaves with the old GL engine.
    gamescope_enabled: true
