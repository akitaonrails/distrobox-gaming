# Per-game Windows trainers launched inside Steam Proton prefixes.
# Offline/single-player only. Do not use with VAC/EAC/BattlEye/multiplayer.

dg_steam_trainers_root: "{{ dg_box_home }}/tools/steam-trainers"
dg_steam_trainers_download_dir: "{{ dg_steam_trainers_root }}/downloads"
dg_steam_trainers_install_dir: "{{ dg_steam_trainers_root }}/installed"
dg_steam_trainers_config: "{{ dg_steam_trainers_root }}/trainers.tsv"
dg_steam_trainers_wrapper_bin: "{{ dg_box_home }}/bin/steam-trainer"
dg_steam_trainers_host_bin_dir: "{{ ansible_facts.env.HOME }}/.local/bin"
dg_steam_trainers_host_launcher: "{{ dg_steam_trainers_host_bin_dir }}/dg-fling"
dg_steam_trainers_bash_completion_dir: "{{ ansible_facts.env.HOME }}/.local/share/bash-completion/completions"
dg_steam_trainers_zsh_completion_dir: "{{ ansible_facts.env.HOME }}/.local/share/zsh/site-functions"
dg_steam_trainers_steam_config: ""
dg_steam_trainers_stop_steam: false

