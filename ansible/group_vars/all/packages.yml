dg_aur_packages:
  - duckstation-qt-bin
  # pcsx2-latest-bin tracks the rolling 2.7.x AppImage (currently 2.7.274).
  # The stable 2.6.3 (pure `pcsx2`) hard-crashes on GT3 at the car-showcase
  # screen due to a GS renderer regression that was fixed sometime in
  # 2.7.x. Previously pinned to 2.6.3 because the `pcsx2-latest-bin`
  # PKGBUILD had a URL mismatch; upstream has since corrected the build
  # (verified installing 2.7.274 successfully April 2026).
  - pcsx2-latest-bin
  - rpcs3-bin
  - eden-bin
  - cemu-bin
  - xemu-bin
  - vita3k-bin
  - shadps4-bin
  - flycast-git
  - emulationstation-de
  # ROM / patch tools (moved off the host — no desktop use case there)
  - 3dsconv
  - extract-xiso
  - flips

dg_xenia_pacman_packages:
  - wine
  - winetricks
