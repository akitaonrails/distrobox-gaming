  # because the latter's PKGBUILD is broken upstream: pkgver says 2.7.254
  # but the source URL is hardcoded to a non-existent v2.7.260 AppImage.
  - pcsx2
  - rpcs3-bin
  - eden-bin
  - cemu-bin
  - xemu-bin
  - vita3k-bin
  - shadps4-bin
  - flycast-git
