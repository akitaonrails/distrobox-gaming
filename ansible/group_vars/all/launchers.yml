# Host-side desktop launchers for apps installed in the box.
# Each entry renders a .desktop file that runs the app through
# distrobox-enter. Most launchers inherit dg_gpu_env so standalone
# emulators prefer the NVIDIA ICD. Steam is deliberately excluded from
# that forced ICD path because pressure-vessel rewrites VK_ICD_FILENAMES
# into its app container and can strand Proton with no WSI-capable ICD.

dg_emulator_launchers:
  - name: gaming-es-de
    display_name: "ES-DE (on {{ dg_box_name }})"
    exec: es-de
    icon: es-de
    comment: "Emulator frontend"
    wm_class: es-de

  - name: gaming-dolphin
    display_name: "Dolphin (on {{ dg_box_name }})"
    exec: dolphin-emu
    icon: dolphin-emu
    comment: "GameCube and Wii emulator"
    wm_class: dolphin-emu

  - name: gaming-duckstation
    display_name: "DuckStation (on {{ dg_box_name }})"
    exec: duckstation-qt
    icon: duckstation
    comment: "PlayStation 1 emulator"
    wm_class: duckstation-qt

  - name: gaming-pcsx2
    display_name: "PCSX2 (on {{ dg_box_name }})"
    exec: pcsx2-qt
    icon: PCSX2
    comment: "PlayStation 2 emulator"
    wm_class: pcsx2-qt

  - name: gaming-melonds
    display_name: "melonDS (on {{ dg_box_name }})"
    exec: "{{ dg_box_home }}/bin/melonds-launch"
    icon: net.kuribo64.melonDS
    comment: "Nintendo DS emulator"
    wm_class: melonDS

  - name: gaming-ppsspp
    display_name: "PPSSPP (on {{ dg_box_name }})"
    exec: PPSSPPQt
    icon: ppsspp
    comment: "PSP emulator"
    wm_class: ppsspp

  - name: gaming-rpcs3
    display_name: "RPCS3 (on {{ dg_box_name }})"
    exec: rpcs3
    icon: rpcs3
    comment: "PlayStation 3 emulator"
    wm_class: rpcs3

  - name: gaming-xemu
    display_name: "xemu (on {{ dg_box_name }})"
    # Wrapper at $HOME/bin/xemu — re-asserts surface_scale in
    # xemu.toml before handing off to /opt/xemu/bin/xemu, because
    # xemu's View → Int. Resolution Scale doesn't persist across
    # sessions on this stack. See seed_configs/templates/xemu-launch.sh.j2.
    exec: "{{ dg_box_home }}/bin/xemu"
    icon: xemu
    comment: "Xbox emulator"
    wm_class: xemu

  - name: gaming-eden
    display_name: "Eden (on {{ dg_box_name }})"
    exec: "env -u QT_STYLE_OVERRIDE eden"
    icon: eden
    comment: "Nintendo Switch emulator"
    wm_class: eden

  - name: gaming-cemu
    display_name: "Cemu (on {{ dg_box_name }})"
    exec: cemu
    icon: info.cemu.Cemu
    comment: "Wii U emulator"
    wm_class: cemu

  - name: gaming-vita3k
    display_name: "Vita3K (on {{ dg_box_name }})"
    exec: vita3k
    icon: vita3k
    comment: "PS Vita emulator"
    wm_class: vita3k

  - name: gaming-steam
    display_name: "Steam (on {{ dg_box_name }})"
    exec: "{{ dg_box_home }}/bin/steam-launch"
    # Do not force GPU env for Steam itself: global LD_LIBRARY_PATH changes can
    # crash the 32-bit Steam updater/client, and forcing VK_ICD_FILENAMES breaks
    # Proton under pressure-vessel. Apply game-specific overrides through Steam
    # launch options or dedicated wrappers instead.
    gpu_env: ""
    icon: steam
    comment: "Steam game launcher"
    wm_class: Steam

  - name: gaming-azahar
    display_name: "Azahar (on {{ dg_box_name }})"
    exec: "{{ dg_box_home }}/bin/azahar-launch"
    icon: org.azahar_emu.azahar
    comment: "Nintendo 3DS emulator (Citra fork)"
    wm_class: org.azahar_emu.azahar

  - name: gaming-retroarch
    display_name: "RetroArch (on {{ dg_box_name }})"
    exec: retroarch
    icon: retroarch
    comment: "Multi-system libretro emulator frontend"
    wm_class: retroarch
