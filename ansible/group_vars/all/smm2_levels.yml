# Offline Super Mario Maker 2 level injection (opt-in role).
#
# Pipeline: fetch the most-liked courses from the tgrcode.com MariOver
# API (a mirror of Nintendo's live SMM2 servers), then register them in
# Eden's SMM2 save via a small Rust tool built on Tarnadas' smmdb-lib
# (which handles course/thumbnail encryption and save.dat slot
# bookkeeping). Injected courses land in Coursebot's "My Courses" with
# full editor access. Slots 0-59 only: 60 courses max per run.
#
# The game must have been launched once in Eden so save.dat exists —
# the role fails with a clear message otherwise. A pristine backup of
# the save dir is taken before the first injection.

dg_smm2_levels_root: "{{ dg_box_home }}/tools/smm2-levels"
dg_smm2_levels_courses_dir: "{{ dg_smm2_levels_root }}/courses"
dg_smm2_levels_injector_dir: "{{ dg_smm2_levels_root }}/injector"
dg_smm2_levels_count: 60

# Courses uploaded after this date are filtered out because course
# files saved on newer game versions refuse to load on older games.
# This machine's SMM2 is EUR v1.0.1, so the cutoff is v1.1.0's release
# date. Set to "" (no filter) once the game is updated to 3.0.x.
dg_smm2_levels_max_uploaded: "2019-10-01"

# Eden per-profile save dir for SMM2 (title 01009B90006DC000). The
# profile UUID is machine-specific — find yours under
# <eden data>/nand/user/save/0000000000000000/.
dg_smm2_eden_profile: C14BBFDD6EAFE5136A2EC50DC2D4A913
dg_smm2_save_dir: "{{ dg_eden_data_dir }}/nand/user/save/0000000000000000/{{ dg_smm2_eden_profile }}/01009B90006DC000"
