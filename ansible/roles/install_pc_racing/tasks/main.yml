---
- name: Select PC racing games for this run
  ansible.builtin.set_fact:
    _dg_pc_racing_games_selected: >-
      {{ dg_pc_racing_games
         if (dg_pc_racing_selected_slugs | length == 0)
         else (dg_pc_racing_games | selectattr('slug', 'in', dg_pc_racing_selected_slugs) | list) }}

- name: Build PC racing Wine environment
  ansible.builtin.set_fact:
    _dg_pc_racing_wine_env: >-
      env -u PYTHONHOME -u PYTHONPATH
      PATH="{{ dg_pc_racing_wine_path }}"
      WINEARCH="{{ dg_pc_racing_winearch }}"

- name: Assert selected PC racing game slugs exist
  ansible.builtin.assert:
    that: _dg_pc_racing_games_selected | length == dg_pc_racing_selected_slugs | length
    fail_msg: "Unknown PC racing slug in dg_pc_racing_selected_slugs={{ dg_pc_racing_selected_slugs }}"
  when: dg_pc_racing_selected_slugs | length > 0

- name: Remove legacy Lutris and UMU packages inside box
  ansible.builtin.shell: |
    {{ dg_in_box }} sh -lc '
      set -eu
      changed=0
      for pkg in {{ dg_pc_racing_legacy_packages | join(' ') }}; do
        if pacman -Q "$pkg" >/dev/null 2>&1; then
          sudo pacman -Rns --noconfirm "$pkg"
          changed=1
        fi
      done
      [ "$changed" = 1 ] && printf "%s\n" "removed-legacy-packages" || true
    '
  register: _pc_racing_legacy_packages
  changed_when: "'removed-legacy-packages' in _pc_racing_legacy_packages.stdout"
  when: dg_pc_racing_cleanup_legacy | bool

- name: Remove legacy Lutris and UMU user data inside box
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop: "{{ dg_pc_racing_legacy_paths }}"
  when: dg_pc_racing_cleanup_legacy | bool

- name: Create PC racing root directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ dg_pc_racing_prefix_root }}"
    - "{{ dg_pc_racing_media_root }}"
    - "{{ dg_pc_racing_cache_root }}"
    - "{{ dg_pc_racing_wine_runner_root }}"
    - "{{ dg_box_home }}/bin"
    - "{{ dg_desktop_render_dir }}"

- name: Create PC racing install root inside box
  ansible.builtin.shell: "{{ dg_in_box }} mkdir -p '{{ dg_pc_racing_install_root }}'"
  changed_when: false

- name: Install PC racing Wine packages inside box
  ansible.builtin.shell: >-
    {{ dg_in_box }} sudo pacman -Sy --needed --noconfirm
    {{ dg_pc_racing_packages | join(' ') }}
  register: _pc_racing_pacman
  changed_when: "'installing' in _pc_racing_pacman.stdout"

- name: Download PC racing Wine runners
  ansible.builtin.get_url:
    url: "{{ item.wine_runner.url }}"
    dest: "{{ item.wine_runner.source }}"
    mode: "0644"
  loop: "{{ _dg_pc_racing_games_selected }}"
  loop_control:
    label: "{{ item.name }} / {{ item.wine_runner.name | default('wine-runner') }}"
  when:
    - item.wine_runner is defined
    - item.wine_runner.url is defined

- name: Extract PC racing source archives inside box
  ansible.builtin.shell: |
    {{ dg_in_box }} sh -lc '
      set -eu
      archive="{{ item.source_archive | default('') }}"
      source_dir="{{ item.source_dir }}"
      marker="$source_dir/.dg-source-archive-$(basename "$archive")"

      if [ -z "$archive" ]; then
        exit 0
      fi
      if [ ! -f "$archive" ]; then
        printf "%s\n" "ERROR: source archive missing: $archive" >&2
        exit 1
      fi
      if [ -f "$marker" ]; then
        exit 0
      fi

      mkdir -p "$source_dir"
      7z x -y -o"$source_dir" "$archive" >/dev/null
      printf "%s\n" "$archive" > "$marker"
      printf "%s\n" "source-archive-extracted {{ item.name }}"
    '
  register: _pc_racing_source_archives
  changed_when: "'source-archive-extracted' in _pc_racing_source_archives.stdout"
  loop: "{{ _dg_pc_racing_games_selected }}"
  loop_control:
    label: "{{ item.name }}"
  when: item.source_archive is defined

- name: Extract PC racing Wine runners
  ansible.builtin.unarchive:
    src: "{{ item.wine_runner.source }}"
    dest: "{{ dg_pc_racing_wine_runner_root }}"
    remote_src: true
    creates: "{{ item.wine_runner.creates }}"
  loop: "{{ _dg_pc_racing_games_selected }}"
  loop_control:
    label: "{{ item.name }} / {{ item.wine_runner.name | default('wine-runner') }}"
  when: item.wine_runner is defined

- name: Ensure pinned Arch Wine sidecar runners are extracted
  # Some games regress on the current Wine release and need to be pinned
  # to a known-working version. We extract an Arch wine-X.Y-N pkg.tar.zst
  # into wine_runner_root/wine-X.Y/, then a game's catalog entry points
  # wine_binary/wine_path at that sidecar. System Wine stays free to
  # update for every other game.
  ansible.builtin.shell: |
    {{ dg_in_box }} sh -lc '
      set -eu
      version="{{ item.version }}"
      release="{{ item.release | default("1") }}"
      runner_dir="{{ dg_pc_racing_wine_runner_root }}/wine-${version}"
      if [ -x "$runner_dir/usr/bin/wine" ]; then
        exit 0
      fi
      pkg="/var/cache/pacman/pkg/wine-${version}-${release}-x86_64.pkg.tar.zst"
      if [ ! -f "$pkg" ]; then
        pkg="{{ dg_pc_racing_cache_root }}/wine-${version}-${release}-x86_64.pkg.tar.zst"
        if [ ! -f "$pkg" ]; then
          mkdir -p "$(dirname "$pkg")"
          curl -fL --retry 3 \
            -o "$pkg" \
            "https://archive.archlinux.org/packages/w/wine/wine-${version}-${release}-x86_64.pkg.tar.zst"
        fi
      fi
      mkdir -p "$runner_dir"
      tar -I zstd -xf "$pkg" -C "$runner_dir"
      printf "%s\n" "extracted-pinned-wine ${version}-${release}"
    '
  register: _pc_racing_pinned_wine
  changed_when: "'extracted-pinned-wine' in _pc_racing_pinned_wine.stdout"
  loop: "{{ dg_pc_racing_pinned_wine_runners }}"
  loop_control:
    label: "wine-{{ item.version }}-{{ item.release | default('1') }}"

- name: Validate PC racing source directories
  ansible.builtin.stat:
    path: "{{ item.source_dir }}"
  loop: "{{ _dg_pc_racing_games_selected }}"
  loop_control:
    label: "{{ item.name }}"
  register: _pc_racing_sources

- name: Assert PC racing source directories exist
  ansible.builtin.assert:
    that: item.stat.exists and item.stat.isdir
    fail_msg: "Missing PC racing source directory: {{ item.item.source_dir }}"
  loop: "{{ _pc_racing_sources.results }}"
  loop_control:
    label: "{{ item.item.name }}"

- name: Create per-game install directories
  ansible.builtin.shell: "{{ dg_in_box }} mkdir -p '{{ dg_pc_racing_install_root }}/{{ item.slug }}'"
  changed_when: false
  loop: "{{ _dg_pc_racing_games_selected }}"
  loop_control:
    label: "{{ item.name }}"

- name: Create per-game prefix directories
  ansible.builtin.file:
    path: "{{ item.prefix_path | default(dg_pc_racing_prefix_root ~ '/' ~ item.slug) }}"
    state: directory
    mode: "0755"
  loop: "{{ _dg_pc_racing_games_selected }}"
  loop_control:
    label: "{{ item.name }}"

- name: Check PC racing prefix initialization
  ansible.builtin.stat:
    path: "{{ item.prefix_path | default(dg_pc_racing_prefix_root ~ '/' ~ item.slug) }}/system.reg"
  loop: "{{ _dg_pc_racing_games_selected }}"
  loop_control:
    label: "{{ item.name }}"
  register: _pc_racing_prefixes

- name: Initialize PC racing Wine prefixes
  ansible.builtin.shell: |
    {{ dg_in_box }} sh -lc '
      set -eu
      prefix="{{ item.item.prefix_path | default(dg_pc_racing_prefix_root ~ "/" ~ item.item.slug) }}"
      wineboot_command="{{ item.item.wineboot_command | default(item.item.wineboot_binary | default('wineboot')) }}"
      timeout_seconds="{{ item.item.wineboot_timeout | default(300) }}"
      accept_initialized_timeout="{{ item.item.wineboot_accept_timeout_if_initialized | default(false) | bool | ternary('1', '0') }}"

      export PATH="{{ item.item.wine_path | default(dg_pc_racing_wine_path) }}"
      export WINEARCH="{{ item.item.winearch | default(dg_pc_racing_winearch) }}"
      export WINEPREFIX="$prefix"
      export WINEDEBUG=-all

      set +e
      timeout "$timeout_seconds" sh -lc "$wineboot_command -u"
      rc=$?
      set -e

      if [ "$rc" -eq 124 ] && [ "$accept_initialized_timeout" = "1" ] && [ -f "$prefix/system.reg" ]; then
        wineserver -k >/dev/null 2>&1 || true
        printf "%s\n" "wineboot-timeout-accepted {{ item.item.name }}"
        exit 0
      fi

      exit "$rc"
    '
  loop: "{{ _pc_racing_prefixes.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  when: not item.stat.exists

- name: Link install root as G drive in each prefix
  ansible.builtin.file:
    src: "{{ dg_pc_racing_install_root }}"
    dest: "{{ item.prefix_path | default(dg_pc_racing_prefix_root ~ '/' ~ item.slug) }}/dosdevices/g:"
    state: link
    force: true
    follow: false
  loop: "{{ _dg_pc_racing_games_selected }}"
  loop_control:
    label: "{{ item.name }}"

- name: Configure PC racing Wine controller backend
  ansible.builtin.shell: |
    {{ dg_in_box }} sh -lc '
      set -eu
      export WINEPREFIX="{{ item.0.prefix_path | default(dg_pc_racing_prefix_root ~ '/' ~ item.0.slug) }}"
      export WINEARCH="{{ item.0.winearch | default(dg_pc_racing_winearch) }}"
      export WINEDEBUG=-all
      export PATH="{{ item.0.wine_path | default(dg_pc_racing_wine_path) }}"
      wine_bin="{{ item.0.wine_binary | default('wine') }}"
      key="HKEY_LOCAL_MACHINE\System\CurrentControlSet\Services\winebus"
      name="{{ item.1.name }}"
      value="{{ item.1.value }}"

      if env -u PYTHONHOME -u PYTHONPATH "$wine_bin" reg query "$key" /v "$name" 2>/dev/null | grep -Eq "REG_DWORD[[:space:]]+0x0*${value}"; then
        exit 0
      fi

      env -u PYTHONHOME -u PYTHONPATH "$wine_bin" reg add "$key" /v "$name" /t REG_DWORD /d "$value" /f
      printf "%s\n" "configured-winebus {{ item.0.name }} $name=$value"
    '
  register: _pc_racing_winebus
  changed_when: "'configured-winebus' in _pc_racing_winebus.stdout"
  loop: "{{ _dg_pc_racing_games_selected | product(dg_pc_racing_winebus_registry) | list }}"
  loop_control:
    label: "{{ item.0.name }} / {{ item.1.name }}"
  when: item.1.name not in (item.0.winebus_registry | default([]) | map(attribute='name') | list)

- name: Configure per-game PC racing Wine controller backend overrides
  ansible.builtin.shell: |
    {{ dg_in_box }} sh -lc '
      set -eu
      export WINEPREFIX="{{ item.0.prefix_path | default(dg_pc_racing_prefix_root ~ '/' ~ item.0.slug) }}"
      export WINEARCH="{{ item.0.winearch | default(dg_pc_racing_winearch) }}"
      export WINEDEBUG=-all
      export PATH="{{ item.0.wine_path | default(dg_pc_racing_wine_path) }}"
      wine_bin="{{ item.0.wine_binary | default('wine') }}"
      key="HKEY_LOCAL_MACHINE\System\CurrentControlSet\Services\winebus"
      name="{{ item.1.name }}"
      value="{{ item.1.value }}"

      if env -u PYTHONHOME -u PYTHONPATH "$wine_bin" reg query "$key" /v "$name" 2>/dev/null | grep -Eq "REG_DWORD[[:space:]]+0x0*${value}"; then
        exit 0
      fi

      env -u PYTHONHOME -u PYTHONPATH "$wine_bin" reg add "$key" /v "$name" /t REG_DWORD /d "$value" /f
      printf "%s\n" "configured-winebus-override {{ item.0.name }} $name=$value"
    '
  register: _pc_racing_winebus_overrides
  changed_when: "'configured-winebus-override' in _pc_racing_winebus_overrides.stdout"
  loop: "{{ _dg_pc_racing_games_selected | subelements('winebus_registry', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.name }} / {{ item.1.name }}"

- name: Disable known bad DirectInput pseudo-joysticks
  ansible.builtin.shell: |
    {{ dg_in_box }} sh -lc '
      set -eu
      export WINEPREFIX="{{ item.0.prefix_path | default(dg_pc_racing_prefix_root ~ '/' ~ item.0.slug) }}"
      export WINEARCH="{{ item.0.winearch | default(dg_pc_racing_winearch) }}"
      export WINEDEBUG=-all
      export PATH="{{ item.0.wine_path | default(dg_pc_racing_wine_path) }}"
      wine_bin="{{ item.0.wine_binary | default('wine') }}"
      key="HKEY_CURRENT_USER\Software\Wine\DirectInput\Joysticks"
      name="{{ item.1 }}"

      if env -u PYTHONHOME -u PYTHONPATH "$wine_bin" reg query "$key" /v "$name" 2>/dev/null | grep -Eq "REG_SZ[[:space:]]+disabled"; then
        exit 0
      fi

      env -u PYTHONHOME -u PYTHONPATH "$wine_bin" reg add "$key" /v "$name" /t REG_SZ /d disabled /f
      printf "%s\n" "disabled-dinput-joystick {{ item.0.name }} $name"
    '
  register: _pc_racing_dinput_disabled_joysticks
  changed_when: "'disabled-dinput-joystick' in _pc_racing_dinput_disabled_joysticks.stdout"
  loop: "{{ _dg_pc_racing_games_selected | product(dg_pc_racing_dinput_disabled_joysticks) | list }}"
  loop_control:
    label: "{{ item.0.name }} / {{ item.1 }}"
  when: dg_pc_racing_dinput_disabled_joysticks | length > 0

- name: Configure PC racing game registry values
  ansible.builtin.shell: |
    {{ dg_in_box }} sh -lc '
      set -eu
      export WINEPREFIX="{{ item.0.prefix_path | default(dg_pc_racing_prefix_root ~ '/' ~ item.0.slug) }}"
      export WINEARCH="{{ item.0.winearch | default(dg_pc_racing_winearch) }}"
      export WINEDEBUG=-all
      export PATH="{{ item.0.wine_path | default(dg_pc_racing_wine_path) }}"
      wine_bin="{{ item.0.wine_binary | default('wine') }}"
      key="{{ item.1.key }}"
      name="{{ item.1.name }}"
      type="{{ item.1.type | default('REG_SZ') }}"
      value="{{ item.1.value }}"

      if [ "$type" = "REG_DWORD" ]; then
        case "$value" in
          0x*|0X*) desired_hex="${value#0x}"; desired_hex="${desired_hex#0X}" ;;
          *) desired_hex="$(printf "%x" "$value")" ;;
        esac

        if env -u PYTHONHOME -u PYTHONPATH "$wine_bin" reg query "$key" /v "$name" 2>/dev/null | grep -Eiq "REG_DWORD[[:space:]]+0x0*${desired_hex}[[:space:]]*$"; then
          exit 0
        fi
      elif env -u PYTHONHOME -u PYTHONPATH "$wine_bin" reg query "$key" /v "$name" 2>/dev/null | grep -F "$value" >/dev/null; then
        exit 0
      fi

      env -u PYTHONHOME -u PYTHONPATH "$wine_bin" reg add "$key" /v "$name" /t "$type" /d "$value" /f
      printf "%s\n" "configured-registry {{ item.0.name }} $key $name=$value"
    '
  register: _pc_racing_registry_values
  changed_when: "'configured-registry' in _pc_racing_registry_values.stdout"
  loop: "{{ _dg_pc_racing_games_selected | subelements('registry_values', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.name }} / {{ item.1.name }}"

- name: Remove PC racing game registry keys
  ansible.builtin.shell: |
    {{ dg_in_box }} sh -lc '
      set -eu
      export WINEPREFIX="{{ item.0.prefix_path | default(dg_pc_racing_prefix_root ~ '/' ~ item.0.slug) }}"
      export WINEARCH="{{ item.0.winearch | default(dg_pc_racing_winearch) }}"
      export WINEDEBUG=-all
      export PATH="{{ item.0.wine_path | default(dg_pc_racing_wine_path) }}"
      wine_bin="{{ item.0.wine_binary | default('wine') }}"
      key="{{ item.1 }}"

      if ! env -u PYTHONHOME -u PYTHONPATH "$wine_bin" reg query "$key" >/dev/null 2>&1; then
        exit 0
      fi

      env -u PYTHONHOME -u PYTHONPATH "$wine_bin" reg delete "$key" /f
      printf "%s\n" "removed-registry-key {{ item.0.name }} $key"
    '
  register: _pc_racing_registry_absent_keys
  changed_when: "'removed-registry-key' in _pc_racing_registry_absent_keys.stdout"
  loop: "{{ _dg_pc_racing_games_selected | subelements('registry_absent_keys', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.name }} / {{ item.1 }}"

- name: Remove PC racing game prefix files
  ansible.builtin.file:
    path: "{{ item.0.prefix_path | default(dg_pc_racing_prefix_root ~ '/' ~ item.0.slug) }}/{{ item.1 }}"
    state: absent
  loop: "{{ _dg_pc_racing_games_selected | subelements('prefix_absent_files', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.name }} / {{ item.1 }}"

- name: Check PC racing winetricks component markers
  ansible.builtin.stat:
    path: "{{ item.0.prefix_path | default(dg_pc_racing_prefix_root ~ '/' ~ item.0.slug) }}/.dg-winetricks-{{ item.1 }}"
  register: _pc_racing_winetricks_markers
  loop: "{{ _dg_pc_racing_games_selected | subelements('winetricks_components', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.name }} / {{ item.1 }}"

- name: Install PC racing winetricks components
  ansible.builtin.shell: |
    {{ dg_in_box }} sh -lc '
      set -eu
      export WINEPREFIX="{{ item.item.0.prefix_path | default(dg_pc_racing_prefix_root ~ '/' ~ item.item.0.slug) }}"
      export WINEARCH="{{ item.item.0.winearch | default(dg_pc_racing_winearch) }}"
      export WINEDEBUG=-all
      export PATH="{{ item.item.0.wine_path | default(dg_pc_racing_wine_path) }}"
      export WINE="{{ item.item.0.wine_binary | default('wine') }}"
      timeout 300 env -u PYTHONHOME -u PYTHONPATH winetricks -q "{{ item.item.1 }}"
      printf "%s\n" "{{ item.item.1 }}" > "{{ item.item.0.prefix_path | default(dg_pc_racing_prefix_root ~ '/' ~ item.item.0.slug) }}/.dg-winetricks-{{ item.item.1 }}"
    '
  register: _pc_racing_winetricks
  changed_when: "'Executing ' in _pc_racing_winetricks.stdout or _pc_racing_winetricks.rc == 0"
  loop: "{{ _pc_racing_winetricks_markers.results | default([]) }}"
  loop_control:
    label: "{{ item.item.0.name }} / {{ item.item.1 }}"
  when: not item.stat.exists

- name: Check PC racing DirectX redist markers
  ansible.builtin.stat:
    path: "{{ item.0.prefix_path | default(dg_pc_racing_prefix_root ~ '/' ~ item.0.slug) }}/.dg-directx-redist-{{ item.1.name }}"
  register: _pc_racing_directx_redist_markers
  loop: "{{ _dg_pc_racing_games_selected | subelements('directx_redists', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.name }} / {{ item.1.name }}"

- name: Install PC racing DirectX redists
  ansible.builtin.shell: |
    {{ dg_in_box }} sh -lc '
      set -eu
      source="{{ item.item.1.source }}"
      extract_dir="{{ dg_pc_racing_cache_root }}/{{ item.item.0.slug }}-{{ item.item.1.name }}"
      marker="{{ item.item.0.prefix_path | default(dg_pc_racing_prefix_root ~ '/' ~ item.item.0.slug) }}/.dg-directx-redist-{{ item.item.1.name }}"

      if [ ! -f "$source" ]; then
        printf "%s\n" "ERROR: DirectX redist missing: $source" >&2
        exit 1
      fi

      mkdir -p "$extract_dir"
      if [ ! -f "$extract_dir/DXSETUP.exe" ]; then
        7z x -y -o"$extract_dir" "$source" >/dev/null
      fi

      cd "$extract_dir"
      WINEPREFIX="{{ item.item.0.prefix_path | default(dg_pc_racing_prefix_root ~ '/' ~ item.item.0.slug) }}" \
      WINEARCH="{{ item.item.0.winearch | default(dg_pc_racing_winearch) }}" \
      WINEDEBUG=-all \
      PATH="{{ item.item.0.wine_path | default(dg_pc_racing_wine_path) }}" \
      timeout 300 env -u PYTHONHOME -u PYTHONPATH "{{ item.item.0.wine_binary | default('wine') }}" DXSETUP.exe /silent
      printf "%s\n" "{{ item.item.1.name }}" > "$marker"
    '
  register: _pc_racing_directx_redists
  changed_when: _pc_racing_directx_redists.rc == 0
  loop: "{{ _pc_racing_directx_redist_markers.results | default([]) }}"
  loop_control:
    label: "{{ item.item.0.name }} / {{ item.item.1.name }}"
  when: not item.stat.exists

- name: Copy unpacked PC racing games to install root
  ansible.builtin.shell: >-
    {{ dg_in_box }} rsync -a --ignore-existing --info=NAME
    {% for disabled_file in item.disabled_files | default([]) %}
    --exclude '{{ disabled_file }}'
    {% endfor %}
    '{{ item.source_dir }}/'
    '{{ dg_pc_racing_install_root }}/{{ item.slug }}/'
  register: _pc_racing_copy
  changed_when: _pc_racing_copy.stdout | length > 0
  loop: "{{ _dg_pc_racing_games_selected }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - dg_pc_racing_copy_unpacked | bool
    - item.install_mode == 'copy'

- name: Extract PC racing Inno Setup packages
  ansible.builtin.shell: |
    {{ dg_in_box }} sh -lc '
      set -eu
      installer="{{ item.source_dir }}/{{ item.installer | default('') }}"
      game_dir="{{ item.installed_path | default(dg_pc_racing_install_root ~ "/" ~ item.slug) }}"
      launch_exe="{{ item.launch_exe | default('') }}"
      extract_root="{{ item.innoextract_root | default('app') }}"
      marker="$game_dir/.dg-innoextract-{{ item.installer | default('setup.exe') }}"

      if [ -n "$launch_exe" ] && [ -f "$game_dir/$launch_exe" ] && [ -f "$marker" ]; then
        exit 0
      fi
      if [ ! -f "$installer" ]; then
        printf "%s\n" "ERROR: Inno installer missing: $installer" >&2
        exit 1
      fi
      if ! command -v innoextract >/dev/null 2>&1; then
        printf "%s\n" "ERROR: innoextract is required for {{ item.name }}" >&2
        exit 1
      fi

      mkdir -p "$game_dir" "{{ dg_pc_racing_cache_root }}"
      tmp="$(mktemp -d "{{ dg_pc_racing_cache_root }}/{{ item.slug }}.inno.XXXXXX")"
      trap '\''rm -rf "$tmp"'\'' EXIT HUP INT TERM

      innoextract --silent --output-dir "$tmp" "$installer"
      if [ -d "$tmp/$extract_root" ]; then
        rsync -a --ignore-existing "$tmp/$extract_root/" "$game_dir/"
      else
        rsync -a --ignore-existing "$tmp/" "$game_dir/"
      fi

      if [ -n "$launch_exe" ] && [ ! -f "$game_dir/$launch_exe" ]; then
        printf "%s\n" "ERROR: launch executable missing after Inno extract: $game_dir/$launch_exe" >&2
        find "$game_dir" -maxdepth 3 -type f -iname "*.exe" -print >&2
        exit 1
      fi

      printf "%s\n" "{{ item.name }} {{ item.installer | default('') }}" > "$marker"
      printf "%s\n" "inno-extracted {{ item.name }}"
    '
  register: _pc_racing_innoextract
  changed_when: "'inno-extracted ' in _pc_racing_innoextract.stdout"
  loop: "{{ _dg_pc_racing_games_selected }}"
  loop_control:
    label: "{{ item.name }}"
  when: item.install_mode == 'innoextract'

- name: Create PC racing game documents config directories
  ansible.builtin.file:
    path: "{{ item.0.prefix_path | default(dg_pc_racing_prefix_root ~ '/' ~ item.0.slug) }}/drive_c/users/{{ ansible_facts.user_id }}/Documents/{{ item.1.path | dirname }}"
    state: directory
    mode: "0755"
  loop: "{{ _dg_pc_racing_games_selected | subelements('documents_config_files', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.name }} / {{ item.1.path | dirname }}"

- name: Write PC racing game documents config files
  ansible.builtin.copy:
    dest: "{{ item.0.prefix_path | default(dg_pc_racing_prefix_root ~ '/' ~ item.0.slug) }}/drive_c/users/{{ ansible_facts.user_id }}/Documents/{{ item.1.path }}"
    content: "{{ item.1.content }}"
    mode: "0644"
    force: "{{ item.1.force | default(true) }}"
  loop: "{{ _dg_pc_racing_games_selected | subelements('documents_config_files', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.name }} / {{ item.1.path }}"

- name: Create PC racing game prefix directories
  ansible.builtin.file:
    path: "{{ item.0.prefix_path | default(dg_pc_racing_prefix_root ~ '/' ~ item.0.slug) }}/{{ item.1 }}"
    state: directory
    mode: "0755"
  loop: "{{ _dg_pc_racing_games_selected | subelements('prefix_directories', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.name }} / {{ item.1 }}"

- name: Create PC racing game prefix file parent directories
  ansible.builtin.file:
    path: "{{ item.0.prefix_path | default(dg_pc_racing_prefix_root ~ '/' ~ item.0.slug) }}/{{ item.1.path | dirname }}"
    state: directory
    mode: "0755"
  loop: "{{ _dg_pc_racing_games_selected | subelements('prefix_files', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.name }} / {{ item.1.path | dirname }}"

- name: Seed PC racing game prefix files
  ansible.builtin.copy:
    dest: "{{ item.0.prefix_path | default(dg_pc_racing_prefix_root ~ '/' ~ item.0.slug) }}/{{ item.1.path }}"
    content: "{{ item.1.content | default('') }}"
    mode: "{{ item.1.mode | default('0644') }}"
    force: "{{ item.1.force | default(false) }}"
  loop: "{{ _dg_pc_racing_games_selected | subelements('prefix_files', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.name }} / {{ item.1.path }}"

- name: Deploy PC racing launcher wrappers
  ansible.builtin.template:
    src: pc-racing-launcher.sh.j2
    dest: "{{ dg_box_home }}/bin/{{ item.slug }}"
    mode: "0755"
  loop: "{{ _dg_pc_racing_games_selected }}"
  loop_control:
    label: "{{ item.name }}"

- name: Deploy PC racing host-side launcher wrappers
  # Games whose catalog entry defines host_pre_launch_commands or
  # host_post_launch_commands get a second wrapper script that runs on
  # the host (not inside the box), so things like hyprctl / monitor
  # mode switches / compositor window rules can happen around the
  # distrobox-enter call. The .desktop entry's Exec points at this
  # wrapper when it exists; otherwise it goes through distrobox-enter
  # directly.
  ansible.builtin.template:
    src: pc-racing-launcher-host.sh.j2
    dest: "{{ dg_box_home }}/bin/{{ item.slug }}-host"
    mode: "0755"
  loop: "{{ _dg_pc_racing_games_selected }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - (item.host_pre_launch_commands is defined) or
      (item.host_post_launch_commands is defined)

- name: Deploy PC racing installer helpers
  ansible.builtin.template:
    src: pc-racing-installer.sh.j2
    dest: "{{ dg_box_home }}/bin/install-{{ item.slug }}"
    mode: "0755"
  loop: "{{ _dg_pc_racing_games_selected }}"
  loop_control:
    label: "{{ item.name }}"

- name: Render PC racing desktop entries
  # Always render so every selected slug has a .desktop alongside the
  # host wrapper at {{ dg_box_home }}/bin/<slug>. Override
  # dg_pc_racing_export_desktop=false in host_vars to skip if you
  # really don't want a desktop entry — installing one for a slug
  # that isn't playable is harmless, the launcher just errors out.
  ansible.builtin.template:
    src: pc-racing.desktop.j2
    dest: "{{ dg_desktop_render_dir }}/pc-{{ item.slug }}.desktop"
    mode: "0644"
  loop: "{{ _dg_pc_racing_games_selected }}"
  loop_control:
    label: "{{ item.name }}"

- name: Install rendered PC racing desktop files into host applications dir
  # Same install-host-launchers.sh used by desktop_apps + azahar +
  # hd-textures roles. Symlinks rendered .desktop files into
  # dg_host_applications_dir, removes stale links, idempotent.
  ansible.builtin.command:
    cmd: "{{ dg_project_root }}/scripts/install-host-launchers.sh"
  environment:
    DG_DESKTOP_RENDER_DIR: "{{ dg_desktop_render_dir }}"
    DG_HOST_APPLICATIONS_DIR: "{{ dg_host_applications_dir }}"
  register: _pc_racing_host_launchers
  changed_when: >-
    'installed ' in _pc_racing_host_launchers.stdout or
    'removed stale ' in _pc_racing_host_launchers.stdout

- name: Check PC racing launch executable state
  ansible.builtin.shell: >-
    {{ dg_in_box }} test -f
    '{{ item.installed_path | default(dg_pc_racing_install_root ~ "/" ~ item.slug) }}/{{ item.launch_exe | default('') }}'
  loop: "{{ _dg_pc_racing_games_selected }}"
  loop_control:
    label: "{{ item.name }}"
  register: _pc_racing_launch_exes
  changed_when: false
  failed_when: false
  when: item.launch_exe is defined

- name: Run PC racing installers when explicitly enabled
  ansible.builtin.shell: "{{ dg_in_box }} {{ dg_box_home }}/bin/install-{{ item.item.slug }}"
  loop: "{{ _pc_racing_launch_exes.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  when:
    - dg_pc_racing_run_installers | bool
    - item.item.install_mode in ['installer', 'iso']
    - item.rc != 0

- name: Download PC racing Xidi archives
  ansible.builtin.get_url:
    url: "{{ item.xidi.url }}"
    dest: "{{ item.xidi.source }}"
    mode: "0644"
  loop: "{{ _dg_pc_racing_games_selected }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - item.xidi is defined
    - item.xidi.url is defined

- name: Apply PC racing Xidi wrappers
  ansible.builtin.shell: |
    {{ dg_in_box }} sh -lc '
      set -eu
      game_dir="{{ item.installed_path | default(dg_pc_racing_install_root ~ "/" ~ item.slug) }}"
      archive="{{ item.xidi.source }}"
      archive_root="{{ item.xidi.archive_root }}"
      architecture="{{ item.xidi.architecture | default('Win32') }}"
      marker="$game_dir/.dg-xidi-{{ item.xidi.archive_root }}-{{ item.xidi.architecture | default('Win32') }}"

      if [ ! -d "$game_dir" ]; then
        printf "%s\n" "ERROR: game directory missing: $game_dir" >&2
        exit 1
      fi
      if [ ! -f "$archive" ]; then
        printf "%s\n" "ERROR: Xidi archive missing: $archive" >&2
        exit 1
      fi
      if [ -f "$marker" ]; then
        exit 0
      fi

      {% if item.xidi.preserve_as_proxy is defined %}
      proxy_source="$game_dir/{{ item.xidi.preserve_as_proxy.source }}"
      proxy_dest="$game_dir/{{ item.xidi.preserve_as_proxy.dest }}"
      if [ -f "$proxy_source" ] && [ ! -f "$proxy_dest" ]; then
        cp "$proxy_source" "$proxy_dest"
      fi
      {% endif %}

      {% for wrapper in item.xidi.wrappers %}
      if [ -f "$game_dir/{{ wrapper }}" ] &&
         [ ! -f "$game_dir/{{ wrapper }}.pre-xidi" ]; then
        cp "$game_dir/{{ wrapper }}" "$game_dir/{{ wrapper }}.pre-xidi"
      fi
      7z e -y -o"$game_dir" "$archive" "$archive_root/$architecture/{{ wrapper }}" >/dev/null
      {% endfor %}

      printf "%s\n" "{{ item.xidi.archive_root }} {{ item.xidi.architecture | default('Win32') }}" > "$marker"
      printf "%s\n" "installed-xidi {{ item.name }}"
    '
  register: _pc_racing_xidi
  changed_when: "'installed-xidi' in _pc_racing_xidi.stdout"
  loop: "{{ _dg_pc_racing_games_selected }}"
  loop_control:
    label: "{{ item.name }}"
  when: item.xidi is defined

- name: Write PC racing Xidi configuration
  ansible.builtin.copy:
    dest: "{{ item.installed_path | default(dg_pc_racing_install_root ~ '/' ~ item.slug) }}/Xidi.ini"
    content: "{{ item.xidi.config }}"
    mode: "0644"
  loop: "{{ _dg_pc_racing_games_selected }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - item.xidi is defined
    - item.xidi.config is defined

- name: Cache PC racing local zip patches
  ansible.builtin.shell: |
    {{ dg_in_box }} sh -lc '
      set -eu
      game_dir="{{ item.0.installed_path | default(dg_pc_racing_install_root ~ "/" ~ item.0.slug) }}"
      patch_src="{{ item.1.source }}"
      pattern="{{ item.1.cache_from_pattern }}"

      if [ -f "$patch_src" ]; then
        exit 0
      fi
      if [ ! -d "$game_dir" ]; then
        printf "%s\n" "ERROR: game directory missing: $game_dir" >&2
        exit 1
      fi

      found="$(find "$game_dir" -path "$game_dir/$pattern" -type f -print -quit)"
      if [ -z "$found" ]; then
        printf "%s\n" "ERROR: local patch missing under $game_dir matching $pattern" >&2
        exit 1
      fi

      mkdir -p "$(dirname "$patch_src")"
      cp "$found" "$patch_src"
      printf "%s\n" "cached-local-patch {{ item.0.name }} {{ item.1.name }}"
    '
  register: _pc_racing_local_patches
  changed_when: "'cached-local-patch' in _pc_racing_local_patches.stdout"
  loop: "{{ _dg_pc_racing_games_selected | subelements('patches', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.name }} / {{ item.1.name }}"
  when: item.1.cache_from_pattern is defined

- name: Download PC racing game zip patches
  ansible.builtin.get_url:
    url: "{{ item.1.url }}"
    dest: "{{ item.1.source }}"
    mode: "0644"
  loop: "{{ _dg_pc_racing_games_selected | subelements('patches', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.name }} / {{ item.1.name }}"
  when: item.1.url is defined

- name: Apply PC racing game zip patches
  ansible.builtin.shell: |
    {{ dg_in_box }} sh -lc '
      set -eu
      game_dir="{{ item.0.installed_path | default(dg_pc_racing_install_root ~ "/" ~ item.0.slug) }}"
      patch_src="{{ item.1.source }}"
      creates="$game_dir/{{ item.1.creates | default('') }}"

      if [ ! -d "$game_dir" ]; then
        printf "%s\n" "ERROR: game directory missing: $game_dir" >&2
        exit 1
      fi
      if [ ! -f "$patch_src" ]; then
        printf "%s\n" "ERROR: patch archive missing: $patch_src" >&2
        exit 1
      fi
      if [ -n "{{ item.1.creates | default('') }}" ] && [ -f "$creates" ]; then
        exit 0
      fi

      if [ -n "{{ item.1.backup_exe | default('') }}" ] &&
         [ -f "$game_dir/{{ item.1.backup_exe | default('') }}" ] &&
         [ ! -f "$game_dir/{{ item.1.backup_exe | default('') }}.original" ]; then
        cp "$game_dir/{{ item.1.backup_exe | default('') }}" "$game_dir/{{ item.1.backup_exe | default('') }}.original"
      fi

      {% for backup_file in item.1.backup_files | default([]) %}
      if [ -f "$game_dir/{{ backup_file }}" ] &&
         [ ! -f "$game_dir/{{ backup_file }}.original" ]; then
        cp "$game_dir/{{ backup_file }}" "$game_dir/{{ backup_file }}.original"
      fi
      {% endfor %}

      {% if item.1.extract_files is defined and (item.1.extract_files | length > 0) -%}
      # Specific paths inside the archive — 7z `e` flattens to game_dir.
      7z e -y -o"$game_dir" "$patch_src" {{ item.1.extract_files | map('quote') | join(' ') }} >/dev/null
      {% elif item.1.extract_flat | default(false) -%}
      7z e -y -o"$game_dir" "$patch_src" >/dev/null
      {% else -%}
      7z x -y -o"$game_dir" "$patch_src" >/dev/null
      {% endif -%}

      {% for move in item.1.post_extract_moves | default([]) %}
      if [ -f "$game_dir/{{ move.source }}" ]; then
        mv -f "$game_dir/{{ move.source }}" "$game_dir/{{ move.dest }}"
      fi
      {% endfor %}

      if [ -n "{{ item.1.creates | default('') }}" ] &&
         [ ! -f "$creates" ]; then
        printf "%s\n" "{{ item.1.name }}" > "$creates"
      fi

      printf "%s\n" "patched {{ item.0.name }} with {{ item.1.name }}"
    '
  register: _pc_racing_patches
  changed_when: "'patched ' in _pc_racing_patches.stdout"
  loop: "{{ _dg_pc_racing_games_selected | subelements('patches', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.name }} / {{ item.1.name }}"

- name: Apply PC racing binary replacements
  ansible.builtin.shell: |
    {{ dg_in_box }} python3 - <<'PY'
    from pathlib import Path

    path = Path(r'''{{ item.0.installed_path | default(dg_pc_racing_install_root ~ "/" ~ item.0.slug) }}/{{ item.1.file }}''')
    find = bytes.fromhex('''{{ item.1.find_hex }}''')
    replace = bytes.fromhex('''{{ item.1.replace_hex }}''')
    max_count = int('''{{ item.1.count | default(1) }}''')

    data = path.read_bytes()
    if find not in data:
        if replace in data:
            raise SystemExit(0)
        raise SystemExit(f"pattern not found in {path}: {{ item.1.name | default(item.1.file) }}")

    if data.count(find) < max_count:
        raise SystemExit(f"expected at least {max_count} pattern matches in {path}, found {data.count(find)}")

    path.write_bytes(data.replace(find, replace, max_count))
    print("binary-replaced {{ item.0.name }} {{ item.1.file }} {{ item.1.name | default('') }}")
    PY
  register: _pc_racing_binary_replacements
  changed_when: "'binary-replaced ' in _pc_racing_binary_replacements.stdout"
  loop: "{{ _dg_pc_racing_games_selected | subelements('binary_replacements', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.name }} / {{ item.1.file }} {{ item.1.name | default('') }}"

- name: Apply PC racing text replacements
  ansible.builtin.shell: |
    {{ dg_in_box }} python3 - <<'PY'
    from pathlib import Path

    path = Path(r'''{{ item.0.installed_path | default(dg_pc_racing_install_root ~ "/" ~ item.0.slug) }}/{{ item.1.file }}''')
    find = r'''{{ item.1.find }}'''
    replace = r'''{{ item.1.replace }}'''

    text = path.read_text()
    if find not in text:
        if replace in text:
            raise SystemExit(0)
        raise SystemExit(f"text pattern not found in {path}: {{ item.1.name | default(item.1.file) }}")

    path.write_text(text.replace(find, replace, int('''{{ item.1.count | default(1) }}''')))
    print("text-replaced {{ item.0.name }} {{ item.1.file }} {{ item.1.name | default('') }}")
    PY
  register: _pc_racing_text_replacements
  changed_when: "'text-replaced ' in _pc_racing_text_replacements.stdout"
  loop: "{{ _dg_pc_racing_games_selected | subelements('text_replacements', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.name }} / {{ item.1.file }} {{ item.1.name | default('') }}"

- name: Configure PC racing game managed text blocks
  ansible.builtin.blockinfile:
    path: "{{ item.0.installed_path | default(dg_pc_racing_install_root ~ '/' ~ item.0.slug) }}/{{ item.1.file }}"
    marker: "{{ item.1.marker | default('# {mark} distrobox-gaming ' ~ item.1.name) }}"
    insertafter: "{{ item.1.insertafter | default(omit) }}"
    create: "{{ item.1.create | default(false) }}"
    state: "{{ item.1.state | default('present') }}"
    mode: "{{ item.1.mode | default('0644') }}"
    block: "{{ item.1.block }}"
  loop: "{{ _dg_pc_racing_games_selected | subelements('config_blocks', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.name }} / {{ item.1.file }} {{ item.1.name }}"

- name: Disable PC racing local files that conflict with Wine runtime
  ansible.builtin.shell: |
    {{ dg_in_box }} sh -lc '
      set -eu
      game_dir="{{ item.0.installed_path | default(dg_pc_racing_install_root ~ "/" ~ item.0.slug) }}"
      rel="{{ item.1 }}"
      path="$game_dir/$rel"
      backup="$path.disabled-by-distrobox-gaming"

      if [ ! -d "$game_dir" ]; then
        printf "%s\n" "ERROR: game directory missing: $game_dir" >&2
        exit 1
      fi
      if [ ! -e "$path" ]; then
        exit 0
      fi
      if [ ! -e "$backup" ]; then
        cp -a "$path" "$backup"
      fi
      rm -f "$path"
      printf "%s\n" "disabled-local-file {{ item.0.name }} $rel"
    '
  register: _pc_racing_disabled_files
  changed_when: "'disabled-local-file' in _pc_racing_disabled_files.stdout"
  loop: "{{ _dg_pc_racing_games_selected | subelements('disabled_files', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.name }} / {{ item.1 }}"

- name: Configure PC racing game INI values
  ansible.builtin.shell: |
    {{ dg_in_box }} sh -lc '
      set -eu
      game_dir="{{ item.0.installed_path | default(dg_pc_racing_install_root ~ "/" ~ item.0.slug) }}"
      ini="$game_dir/{{ item.1.file }}"
      key="{{ item.1.key }}"
      value="{{ item.1.value }}"
      separator="{{ item.1.separator | default('=') }}"
      tmp="$ini.tmp.$$"

      if [ ! -d "$game_dir" ]; then
        printf "%s\n" "ERROR: game directory missing: $game_dir" >&2
        exit 1
      fi
      touch "$ini"
      desired="${key}${separator}${value}"

      if grep -Eq "^[[:space:]]*${key}[[:space:]]*=" "$ini"; then
        if [ "$(grep -Ec "^[[:space:]]*${key}[[:space:]]*=" "$ini")" = 1 ] &&
           [ "$(grep -E "^[[:space:]]*${key}[[:space:]]*=" "$ini")" = "$desired" ]; then
          exit 0
        fi

        seen=0
        while IFS= read -r line; do
          if printf "%s\n" "$line" | grep -Eq "^[[:space:]]*${key}[[:space:]]*="; then
            if [ "$seen" = 0 ]; then
              printf "%s\n" "$desired"
              seen=1
            fi
          else
            printf "%s\n" "$line"
          fi
        done < "$ini" > "$tmp"
        mv "$tmp" "$ini"
      else
        printf "%s\n" "$desired" >> "$ini"
      fi

      printf "%s\n" "configured {{ item.0.name }} {{ item.1.file }} {{ item.1.key }}"
    '
  register: _pc_racing_ini
  changed_when: "'configured ' in _pc_racing_ini.stdout"
  loop: "{{ _dg_pc_racing_games_selected | subelements('ini', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.name }} / {{ item.1.file }} {{ item.1.key }}"

- name: Report PC racing setup commands
  ansible.builtin.debug:
    msg: >-
      Prepared {{ item.name }}. Install helper:
      {{ dg_box_home }}/bin/install-{{ item.slug }}. Launcher:
      {{ dg_box_home }}/bin/{{ item.slug }}.
  loop: "{{ _dg_pc_racing_games_selected }}"
  loop_control:
    label: "{{ item.name }}"
