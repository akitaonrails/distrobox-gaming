---
- name: Create Render96ex directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ dg_render96ex_root }}"
    - "{{ dg_render96ex_cache_dir }}"
    - "{{ dg_render96ex_install_dir }}"
    - "{{ dg_box_home }}/bin"

- name: Install Render96ex build dependencies inside box
  ansible.builtin.shell: >-
    {{ dg_in_box }} sudo pacman -S --needed --noconfirm
    {{ dg_render96ex_pacman_packages | join(' ') }}
  register: _render96ex_pacman
  changed_when: "'installing' in _render96ex_pacman.stdout or 'upgrading' in _render96ex_pacman.stdout"

- name: Check out Render96ex source
  ansible.builtin.shell: |
    set -eu
    if [ -d "{{ dg_render96ex_source_dir }}/.git" ] &&
       [ -f "{{ dg_render96ex_source_dir }}/.dg-source-ref" ] &&
       grep -qx "{{ dg_render96ex_git_ref }}" "{{ dg_render96ex_source_dir }}/.dg-source-ref" &&
       [ "$(git -C "{{ dg_render96ex_source_dir }}" rev-parse HEAD)" = "{{ dg_render96ex_git_ref }}" ]; then
      exit 0
    fi

    rm -rf "{{ dg_render96ex_source_dir }}"
    git clone --single-branch --branch alpha "{{ dg_render96ex_repo_url }}" "{{ dg_render96ex_source_dir }}"
    cd "{{ dg_render96ex_source_dir }}"
    git checkout "{{ dg_render96ex_git_ref }}"
    printf '%s\n' "{{ dg_render96ex_git_ref }}" > .dg-source-ref
    printf '%s\n' 'checked-out-render96ex-source'
  register: _render96ex_source
  changed_when: "'checked-out-render96ex-source' in _render96ex_source.stdout"

- name: Prepare verified SM64 US baserom for Render96ex
  ansible.builtin.include_role:
    name: n64_rom_prepare
  vars:
    n64_rom_label: Super Mario 64 US
    n64_rom_src: "{{ dg_render96ex_rom_source }}"
    n64_rom_dst: "{{ dg_render96ex_source_dir }}/baserom.us.z64"
    n64_rom_sha1: "{{ dg_render96ex_baserom_sha1 }}"

- name: Build Render96ex
  ansible.builtin.shell: |
    {{ dg_in_box }} sh -lc '
      set -eu
      cd "{{ dg_render96ex_source_dir }}"
      if [ -x build/us_pc/sm64.us.f3dex2e ] &&
         [ -f .dg-built-ref ] &&
         grep -qx "{{ dg_render96ex_build_id }}" .dg-built-ref; then
        exit 0
      fi
      rm -rf build
      make -j"$(nproc)" {{ dg_render96ex_make_flags }}
      test -x build/us_pc/sm64.us.f3dex2e
      printf "%s\n" "{{ dg_render96ex_build_id }}" > .dg-built-ref
      printf "%s\n" "built-render96ex {{ dg_render96ex_build_id }}"
    '
  register: _render96ex_build
  changed_when: "'built-render96ex' in _render96ex_build.stdout"

- name: Download Render96 DynOS model pack
  ansible.builtin.get_url:
    url: "{{ dg_render96ex_model_pack_url }}"
    dest: "{{ dg_render96ex_cache_dir }}/{{ dg_render96ex_model_pack_name }}"
    checksum: "sha256:{{ dg_render96ex_model_pack_sha256 }}"
    mode: "0644"

- name: Check out Render96 HD texture pack
  ansible.builtin.git:
    repo: "{{ dg_render96ex_texture_pack_url }}"
    dest: "{{ dg_render96ex_texture_source_dir }}"
    version: "{{ dg_render96ex_texture_pack_ref }}"
    update: true
    force: true

- name: Install Render96ex build output and assets
  ansible.builtin.shell: |
    {{ dg_in_box }} sh -lc '
      set -eu
      if [ -x "{{ dg_render96ex_install_dir }}/sm64.us.f3dex2e" ] &&
         [ -f "{{ dg_render96ex_install_dir }}/.dg-installed-ref" ] &&
         grep -qx "{{ dg_render96ex_install_id }}" "{{ dg_render96ex_install_dir }}/.dg-installed-ref" &&
         [ -d "{{ dg_render96ex_install_dir }}/dynos/packs" ] &&
         [ -n "$(find "{{ dg_render96ex_install_dir }}/dynos/packs" -mindepth 1 -print -quit)" ] &&
         [ -d "{{ dg_render96ex_install_dir }}/res/gfx" ] &&
         [ -n "$(find "{{ dg_render96ex_install_dir }}/res/gfx" -mindepth 1 -print -quit)" ]; then
        exit 0
      fi

      rm -rf "{{ dg_render96ex_install_dir }}"
      mkdir -p "{{ dg_render96ex_install_dir }}"
      cp -a "{{ dg_render96ex_source_dir }}/build/us_pc/." "{{ dg_render96ex_install_dir }}/"

      mkdir -p "{{ dg_render96ex_install_dir }}/dynos/packs"
      7z x -y -o"{{ dg_render96ex_install_dir }}/dynos/packs" \
        "{{ dg_render96ex_cache_dir }}/{{ dg_render96ex_model_pack_name }}" >/dev/null

      rm -rf "{{ dg_render96ex_install_dir }}/res/gfx"
      mkdir -p "{{ dg_render96ex_install_dir }}/res"
      cp -a "{{ dg_render96ex_texture_source_dir }}/gfx" "{{ dg_render96ex_install_dir }}/res/gfx"

      printf "%s\n" "{{ dg_render96ex_install_id }}" > "{{ dg_render96ex_install_dir }}/.dg-installed-ref"
      printf "%s\n" "installed-render96ex {{ dg_render96ex_install_dir }}"
    '
  register: _render96ex_install
  changed_when: "'installed-render96ex' in _render96ex_install.stdout"

- name: Install Render96ex launcher wrapper
  ansible.builtin.template:
    src: render96ex.sh.j2
    dest: "{{ dg_render96ex_bin }}"
    mode: "0755"
