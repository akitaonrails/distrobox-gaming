---
- name: Check sudo availability inside box
  ansible.builtin.shell: "{{ dg_in_box }} sudo -n true"
  register: _sudo_check
  changed_when: false
  failed_when: false

- name: Repair sudo inside box if needed
  when: _sudo_check.rc != 0
  block:
    - name: Detect container runtime
      ansible.builtin.command: "which podman"
      register: _has_podman
      changed_when: false
      failed_when: false

    - name: Set container runtime command
      ansible.builtin.set_fact:
        _container_exec: "{{ 'podman' if _has_podman.rc == 0 else 'docker' }}"

    - name: Install passwordless sudo policy
      ansible.builtin.shell: |
        {{ _container_exec }} exec -u root {{ dg_box_name }} sh -c '
          install -d -m 0755 /etc/sudoers.d
          echo "%wheel ALL=(ALL:ALL) NOPASSWD: ALL" > /etc/sudoers.d/zz-distrobox-gaming-nopasswd
          chmod 0440 /etc/sudoers.d/zz-distrobox-gaming-nopasswd
        '
      changed_when: true

    - name: Verify sudo works after repair
      ansible.builtin.shell: "{{ dg_in_box }} sudo -n true"
      changed_when: false

- name: Check if multilib is enabled
  ansible.builtin.shell: "{{ dg_in_box }} grep -qx '\\[multilib\\]' /etc/pacman.conf"
  register: _multilib_check
  changed_when: false
  failed_when: false

- name: Enable multilib repository
  ansible.builtin.shell: |
    {{ dg_in_box }} sudo sh -c '
      cat >> /etc/pacman.conf <<MULTILIB

    [multilib]
    Include = /etc/pacman.d/mirrorlist
    MULTILIB
    '
  when: _multilib_check.rc != 0
  changed_when: true

- name: Sync pacman metadata (needed after multilib enablement)
  ansible.builtin.shell: "{{ dg_in_box }} sudo pacman -Syy --noconfirm"
  when: _multilib_check.rc != 0
  changed_when: true

# NVIDIA dummy packages: distrobox --nvidia bind-mounts host NVIDIA libs
# into /usr/lib, which conflicts with pacman installing nvidia-utils.
# Install dummy packages that satisfy the dependency without writing files.
- name: Install NVIDIA dummy packages when --nvidia is enabled
  when: dg_nvidia_enabled
  block:
    - name: Detect host NVIDIA driver version
      ansible.builtin.command: "nvidia-smi --query-gpu=driver_version --format=csv,noheader"
      register: _nvidia_ver
      changed_when: false
      failed_when: false

    - name: Check if nvidia-utils-dummy is already installed in box
      ansible.builtin.shell: "{{ dg_in_box }} pacman -Q nvidia-utils-dummy"
      register: _dummy_check
      changed_when: false
      failed_when: false

    - name: Build and install nvidia-utils dummy packages
      when:
        - _nvidia_ver.rc == 0
        - _nvidia_ver.stdout | trim | length > 0
        - _dummy_check.rc != 0
      ansible.builtin.shell: |
        {{ dg_in_box }} bash -c '
          set -e
          tmp="$(mktemp -d)"
          cd "$tmp"
          cat > PKGBUILD <<PKG
        pkgname=nvidia-utils-dummy
        pkgver={{ _nvidia_ver.stdout | trim }}
        pkgrel=1
        arch=("x86_64")
        provides=("nvidia-utils=\$pkgver" "vulkan-driver" "opengl-driver" "nvidia-libgl")
        conflicts=("nvidia-libgl" "nvidia-utils")
        package() { :; }
        PKG
          makepkg -f
          sudo pacman -U --noconfirm nvidia-utils-dummy-*.pkg.tar.zst
          cd /
          rm -rf "$tmp"
        '
      changed_when: true

    - name: Check if lib32-nvidia-utils-dummy is needed
      ansible.builtin.shell: "{{ dg_in_box }} pacman -Q lib32-nvidia-utils-dummy lib32-nvidia-utils"
      register: _lib32_check
      changed_when: false
      failed_when: false

    - name: Build and install lib32-nvidia-utils dummy package
      when:
        - _nvidia_ver.rc == 0
        - _nvidia_ver.stdout | trim | length > 0
        - _lib32_check.rc != 0
      ansible.builtin.shell: |
        {{ dg_in_box }} bash -c '
          set -e
          tmp="$(mktemp -d)"
          cd "$tmp"
          cat > PKGBUILD <<PKG
        pkgname=lib32-nvidia-utils-dummy
        pkgver={{ _nvidia_ver.stdout | trim }}
        pkgrel=1
        arch=("x86_64")
        provides=("lib32-nvidia-utils=\$pkgver" "lib32-vulkan-driver" "lib32-opengl-driver" "lib32-nvidia-libgl")
        conflicts=("lib32-nvidia-libgl" "lib32-nvidia-utils")
        package() { :; }
        PKG
          makepkg -f
          sudo pacman -U --noconfirm lib32-nvidia-utils-dummy-*.pkg.tar.zst
          cd /
          rm -rf "$tmp"
        '
      changed_when: true

- name: Full system upgrade
  ansible.builtin.shell: "{{ dg_in_box }} sudo pacman -Syu --noconfirm"
  register: _upgrade
  changed_when: "'upgraded' in _upgrade.stdout or 'installing' in _upgrade.stdout"

- name: Install pacman packages
  ansible.builtin.shell: >-
    {{ dg_in_box }} sudo pacman -S --needed --noconfirm --ask 4
    {{ dg_pacman_packages | join(' ') }}
  register: _pacman
  changed_when: "'installing' in _pacman.stdout"

- name: Check if yay is installed
  ansible.builtin.shell: "{{ dg_in_box }} sh -lc 'command -v yay'"
  register: _yay_check
  changed_when: false
  failed_when: false

- name: Install yay-bin from AUR
  ansible.builtin.shell: |
    {{ dg_in_box }} sh -c '
      tmp="$(mktemp -d)"
      cd "$tmp"
      git clone https://aur.archlinux.org/yay-bin.git
      cd yay-bin
      makepkg -si --noconfirm
      rm -rf "$tmp"
    '
  when: _yay_check.rc != 0

- name: Install AUR packages via yay
  ansible.builtin.shell: >-
    {{ dg_in_box }} yay -S --needed --noconfirm
    --answerclean None --answerdiff None
    {{ dg_aur_packages | join(' ') }}
  register: _yay
  changed_when: "'installing' in _yay.stdout"
