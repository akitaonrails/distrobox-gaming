---
- name: Create 2Ship2Harkinian directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ dg_two_ship2harkinian_root }}"
    - "{{ dg_two_ship2harkinian_cache_dir }}"
    - "{{ dg_two_ship2harkinian_install_dir }}"
    - "{{ dg_box_home }}/bin"

- name: Install 2Ship2Harkinian runtime dependencies inside box
  ansible.builtin.shell: >-
    {{ dg_in_box }} sudo pacman -S --needed --noconfirm
    {{ dg_two_ship2harkinian_pacman_packages | join(' ') }}
  register: _two_ship2harkinian_pacman
  changed_when: "'installing' in _two_ship2harkinian_pacman.stdout or 'upgrading' in _two_ship2harkinian_pacman.stdout"

- name: Download pinned 2Ship2Harkinian release ZIP
  ansible.builtin.get_url:
    url: "{{ dg_two_ship2harkinian_asset_url }}"
    dest: "{{ dg_two_ship2harkinian_cache_dir }}/{{ dg_two_ship2harkinian_asset_name }}"
    checksum: "sha256:{{ dg_two_ship2harkinian_asset_sha256 }}"
    mode: "0644"

- name: Install 2Ship2Harkinian AppImage release
  ansible.builtin.shell: |
    {{ dg_in_box }} sh -lc '
      set -eu
      if [ -x "{{ dg_two_ship2harkinian_install_dir }}/{{ dg_two_ship2harkinian_appimage_name }}" ] &&
         [ -f "{{ dg_two_ship2harkinian_install_dir }}/.dg-installed-ref" ] &&
         grep -qx "{{ dg_two_ship2harkinian_install_id }}" "{{ dg_two_ship2harkinian_install_dir }}/.dg-installed-ref"; then
        exit 0
      fi

      rm -rf "{{ dg_two_ship2harkinian_install_dir }}"
      mkdir -p "{{ dg_two_ship2harkinian_install_dir }}"
      unzip -q "{{ dg_two_ship2harkinian_cache_dir }}/{{ dg_two_ship2harkinian_asset_name }}" -d "{{ dg_two_ship2harkinian_install_dir }}"
      test -f "{{ dg_two_ship2harkinian_install_dir }}/{{ dg_two_ship2harkinian_appimage_name }}"
      chmod 0755 "{{ dg_two_ship2harkinian_install_dir }}/{{ dg_two_ship2harkinian_appimage_name }}"
      printf "%s\n" "{{ dg_two_ship2harkinian_install_id }}" > "{{ dg_two_ship2harkinian_install_dir }}/.dg-installed-ref"
      printf "%s\n" "installed-2ship2harkinian {{ dg_two_ship2harkinian_install_dir }}"
    '
  register: _two_ship2harkinian_install
  changed_when: "'installed-2ship2harkinian' in _two_ship2harkinian_install.stdout"

- name: Prepare verified Majora's Mask USA ROM for 2Ship2Harkinian
  ansible.builtin.shell: |
    python3 - <<'PY'
    from pathlib import Path
    import hashlib

    src = Path(r'''{{ dg_two_ship2harkinian_rom_source }}''')
    dst = Path(r'''{{ dg_two_ship2harkinian_install_dir }}/{{ dg_two_ship2harkinian_rom_name }}''')
    ref = Path(r'''{{ dg_two_ship2harkinian_install_dir }}/.dg-rom-ref''')
    expected = '''{{ dg_two_ship2harkinian_rom_sha1 }}'''

    data = src.read_bytes()
    magic = data[:4]
    if magic == bytes.fromhex('80371240'):
        z64 = data
    elif magic == bytes.fromhex('37804012'):
        z64 = b''.join(
            (data[i + 1:i + 2] + data[i:i + 1]) if i + 1 < len(data) else data[i:i + 1]
            for i in range(0, len(data), 2)
        )
    elif magic == bytes.fromhex('40123780'):
        z64 = b''.join(
            data[i:i + 4][::-1] if len(data[i:i + 4]) == 4 else data[i:i + 4]
            for i in range(0, len(data), 4)
        )
    else:
        raise SystemExit(f'unsupported N64 ROM byte order for {src}: magic={magic.hex()}')

    actual = hashlib.sha1(z64).hexdigest()
    if actual != expected:
        raise SystemExit(f'wrong Majora\'s Mask USA ROM SHA1 for {src}: {actual} != {expected}')

    if dst.exists() and dst.read_bytes() == z64 and ref.exists() and ref.read_text().strip() == expected:
        raise SystemExit(0)

    dst.write_bytes(z64)
    ref.write_text(expected + '\n')
    print(f'prepared-mm-rom {dst}')
    PY
  register: _two_ship2harkinian_rom
  changed_when: "'prepared-mm-rom' in _two_ship2harkinian_rom.stdout"

- name: Install 2Ship2Harkinian launcher wrapper
  ansible.builtin.template:
    src: 2ship2harkinian.sh.j2
    dest: "{{ dg_two_ship2harkinian_bin }}"
    mode: "0755"
