---
- name: "{{ pack.slug }}: stat archive"
  ansible.builtin.stat:
    path: "{{ pack.archive }}"
  register: _pack_archive

- name: "{{ pack.slug }}: report skip when archive missing"
  ansible.builtin.debug:
    msg: |
      skipped — archive not present:
        {{ pack.archive }}
  when: not _pack_archive.stat.exists

- name: "{{ pack.slug }}: resolve emulator-side paths"
  ansible.builtin.set_fact:
    _pack_extract_dir: >-
      {{
        (pack.emu == 'dolphin') | ternary(
          dg_hd_dolphin_extract_root,
          dg_hd_azahar_extract_root
        )
      }}/{{ pack.slug }}
    _pack_emu_textures_dir: >-
      {{
        (pack.emu == 'dolphin') | ternary(
          dg_hd_dolphin_textures_dir,
          dg_hd_azahar_textures_dir
        )
      }}
  when: _pack_archive.stat.exists

- name: "{{ pack.slug }}: ensure extract + emulator dirs exist"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ _pack_extract_dir | default('') }}"
    - "{{ _pack_emu_textures_dir | default('') }}"
  when: _pack_archive.stat.exists

- name: "{{ pack.slug }}: stat extraction marker"
  ansible.builtin.stat:
    path: "{{ _pack_extract_dir }}/.dg-extracted"
  register: _pack_marker
  when: _pack_archive.stat.exists

- name: "{{ pack.slug }}: extract texture subtree from archive"
  # `unzip -o` overwrites partial extracts. Filter pulls only the
  # Load/Textures (or load/textures) tree out of the bundled
  # Windows-portable-emulator zip, sparing ~1-2 GB per pack of
  # binaries we don't need on Linux.
  ansible.builtin.command:
    cmd: >-
      unzip -q -o "{{ pack.archive }}"
      "{{ pack.unzip_pattern }}"
      -d "{{ _pack_extract_dir }}"
  when:
    - _pack_archive.stat.exists
    - not _pack_marker.stat.exists | default(false)

- name: "{{ pack.slug }}: write extraction marker"
  ansible.builtin.file:
    path: "{{ _pack_extract_dir }}/.dg-extracted"
    state: touch
    mode: "0644"
  when:
    - _pack_archive.stat.exists
    - not _pack_marker.stat.exists | default(false)

- name: "{{ pack.slug }}: locate each game_id directory in extract"
  ansible.builtin.find:
    paths: "{{ _pack_extract_dir }}"
    patterns: "{{ item }}"
    file_type: directory
    recurse: true
  register: _gid_find
  loop: "{{ pack.game_ids }}"
  loop_control:
    label: "{{ item }}"
  when: _pack_archive.stat.exists

# Henriko Magnifico's Azahar packs only populate ONE region's TitleID
# dir; the other regions in the zip are 0-file placeholders. To make
# texture loading work regardless of which region dump the user runs
# (since Citra/Azahar's texture lookup is hash-keyed, not region-keyed,
# once you're inside the TitleID dir), we point every game_id entry at
# the single populated dir. Dolphin packs have a single game_id so this
# collapses to a no-op for them.
- name: "{{ pack.slug }}: count files within each matched TitleID dir"
  ansible.builtin.find:
    paths: "{{ item.files[0].path }}"
    file_type: file
    recurse: true
  register: _gid_files_in
  loop: "{{ _gid_find.results | default([]) }}"
  loop_control:
    label: "{{ item.item }}"
  when:
    - _pack_archive.stat.exists
    - item.files | default([]) | length > 0

- name: "{{ pack.slug }}: build populated-dir candidate list"
  ansible.builtin.set_fact:
    _pack_populated: >-
      {{
        _gid_files_in.results
        | rejectattr('skipped', 'defined')
        | selectattr('matched', 'gt', 0)
        | sort(attribute='matched', reverse=true)
        | list
      }}
  when: _pack_archive.stat.exists

- name: "{{ pack.slug }}: select common target dir (most-populated TitleID)"
  ansible.builtin.set_fact:
    _pack_target_dir: "{{ _pack_populated[0].item.files[0].path }}"
  when:
    - _pack_archive.stat.exists
    - _pack_populated | default([]) | length > 0

- name: "{{ pack.slug }}: symlink every game_id at the populated dir"
  # All region-specific TitleIDs (plus the populated one itself) point
  # at the same NAS path. force:true so re-runs heal stale links that
  # used to point at empty placeholder dirs.
  ansible.builtin.file:
    src: "{{ _pack_target_dir }}"
    dest: "{{ _pack_emu_textures_dir }}/{{ item }}"
    state: link
    force: true
  loop: "{{ pack.game_ids }}"
  loop_control:
    label: "{{ item }} -> {{ _pack_target_dir | basename }}"
  when:
    - _pack_archive.stat.exists
    - _pack_target_dir | default('') | length > 0

- name: "{{ pack.slug }}: warn when no populated TitleID dir was found"
  ansible.builtin.debug:
    msg: "WARN — no populated TitleID dir found in {{ _pack_extract_dir }}; symlinks skipped"
  when:
    - _pack_archive.stat.exists
    - _pack_target_dir | default('') | length == 0
