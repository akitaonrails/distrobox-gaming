---
- name: Create Starship directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ dg_starship_root }}"
    - "{{ dg_starship_cache_dir }}"
    - "{{ dg_starship_install_dir }}"
    - "{{ dg_box_home }}/bin"

- name: Install Starship runtime dependencies inside box
  ansible.builtin.shell: >-
    {{ dg_in_box }} sudo pacman -S --needed --noconfirm
    {{ dg_starship_pacman_packages | join(' ') }}
  register: _starship_pacman
  changed_when: "'installing' in _starship_pacman.stdout or 'upgrading' in _starship_pacman.stdout"

- name: Download pinned Starship release ZIP
  ansible.builtin.get_url:
    url: "{{ dg_starship_asset_url }}"
    dest: "{{ dg_starship_cache_dir }}/{{ dg_starship_asset_name }}"
    checksum: "sha256:{{ dg_starship_asset_sha256 }}"
    mode: "0644"

- name: Install Starship AppImage release
  ansible.builtin.shell: |
    {{ dg_in_box }} sh -lc '
      set -eu
      if [ -x "{{ dg_starship_install_dir }}/{{ dg_starship_appimage_name }}" ] &&
         [ -f "{{ dg_starship_install_dir }}/.dg-installed-ref" ] &&
         grep -qx "{{ dg_starship_install_id }}" "{{ dg_starship_install_dir }}/.dg-installed-ref"; then
        exit 0
      fi

      rm -rf "{{ dg_starship_install_dir }}"
      mkdir -p "{{ dg_starship_install_dir }}"
      unzip -q "{{ dg_starship_cache_dir }}/{{ dg_starship_asset_name }}" -d "{{ dg_starship_install_dir }}"
      test -f "{{ dg_starship_install_dir }}/{{ dg_starship_appimage_name }}"
      chmod 0755 "{{ dg_starship_install_dir }}/{{ dg_starship_appimage_name }}"
      printf "%s\n" "{{ dg_starship_install_id }}" > "{{ dg_starship_install_dir }}/.dg-installed-ref"
      printf "%s\n" "installed-starship {{ dg_starship_install_dir }}"
    '
  register: _starship_install
  changed_when: "'installed-starship' in _starship_install.stdout"

- name: Prepare verified Star Fox 64 USA Rev A ROM for Starship
  ansible.builtin.include_role:
    name: n64_rom_prepare
  vars:
    n64_rom_label: Star Fox 64 USA Rev A
    n64_rom_src: "{{ dg_starship_rom_source }}"
    n64_rom_dst: "{{ dg_starship_install_dir }}/{{ dg_starship_rom_name }}"
    n64_rom_sha1: "{{ dg_starship_rom_sha1 }}"
    n64_rom_ref: "{{ dg_starship_install_dir }}/.dg-rom-ref"

- name: Install Starship launcher wrapper
  ansible.builtin.template:
    src: starship.sh.j2
    dest: "{{ dg_starship_bin }}"
    mode: "0755"

- name: Remove legacy Starship launcher that shadows prompt binary
  ansible.builtin.file:
    path: "{{ dg_starship_legacy_bin }}"
    state: absent
  when: dg_starship_legacy_bin != dg_starship_bin
