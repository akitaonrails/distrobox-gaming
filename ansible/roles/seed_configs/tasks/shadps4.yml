---
- name: Ensure shadPS4 config directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ dg_box_home }}/.local/share/shadPS4/custom_configs"
    - "{{ dg_box_home }}/.config/shadPS4/custom_configs"
    - "{{ dg_box_home }}/.local/share/shadPS4/patches"

- name: Deploy Driveclub game config (JSON format)
  # shadPS4 current master (post-commit 90b75ea, April 2026) migrated
  # per-game configs from TOML to JSON. The loader at
  # emulator_settings.cpp:437 hard-codes the `.json` extension — the
  # old .toml file is silently ignored. Key names also changed
  # (e.g. `isPS4Pro` -> `neo_mode`, `Fullscreen` -> `full_screen`).
  ansible.builtin.template:
    src: CUSA00003.json.j2
    dest: "{{ dg_box_home }}/.local/share/shadPS4/custom_configs/{{ dg_shadps4_title_id }}.json"
    backup: true
    mode: "0644"

- name: Remove obsolete TOML per-game config (shadPS4 now ignores it)
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ dg_box_home }}/.local/share/shadPS4/custom_configs/{{ dg_shadps4_title_id }}.toml"
    - "{{ dg_box_home }}/.config/shadPS4/custom_configs/{{ dg_shadps4_title_id }}.toml"

- name: Copy Driveclub patch XML
  ansible.builtin.copy:
    src: shadPS4/Driveclub.xml
    dest: "{{ dg_shadps4_patch_xml }}"
    backup: true
    mode: "0644"
