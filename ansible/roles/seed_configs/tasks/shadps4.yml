---
- name: Ensure shadPS4 config directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ dg_box_home }}/.local/share/shadPS4/custom_configs"
    - "{{ dg_box_home }}/.config/shadPS4/custom_configs"
    - "{{ dg_box_home }}/.local/share/shadPS4/patches"

- name: Deploy per-game shadPS4 configs (JSON format)
  # shadPS4 current master (post-commit 90b75ea, April 2026) migrated
  # per-game configs from TOML to JSON. The loader at
  # emulator_settings.cpp:437 hard-codes the `.json` extension — the
  # old .toml file is silently ignored. Key names also changed
  # (e.g. `isPS4Pro` -> `neo_mode`, `Fullscreen` -> `full_screen`).
  # Add games to dg_shadps4_per_game_configs in group_vars and drop a
  # matching <title_id>.json.j2 template alongside the existing ones.
  ansible.builtin.template:
    src: "{{ item.title_id }}.json.j2"
    dest: "{{ dg_box_home }}/.local/share/shadPS4/custom_configs/{{ item.title_id }}.json"
    backup: true
    mode: "0644"
  loop: "{{ dg_shadps4_per_game_configs }}"
  loop_control:
    label: "{{ item.name }} ({{ item.title_id }})"

- name: Remove obsolete TOML per-game configs (shadPS4 now ignores them)
  ansible.builtin.file:
    path: "{{ item.1 }}/{{ item.0.title_id }}.toml"
    state: absent
  loop: "{{ dg_shadps4_per_game_configs | product([
        dg_box_home + '/.local/share/shadPS4/custom_configs',
        dg_box_home + '/.config/shadPS4/custom_configs',
      ]) | list }}"
  loop_control:
    label: "{{ item.0.title_id }} ({{ 'local-share' if '/.local/share/' in item.1 else 'config' }})"

- name: Copy Driveclub patch XML
  ansible.builtin.copy:
    src: shadPS4/Driveclub.xml
    dest: "{{ dg_shadps4_patch_xml }}"
    backup: true
    mode: "0644"

- name: Link CUSA-named patch to the title-named file
  # The ES-DE bridge wrapper (bin/shadps4-launch) auto-applies a patch
  # iff <patches>/<CUSA>.xml exists — convention is "one file per title
  # ID". The legacy Driveclub desktop entry uses Driveclub.xml directly,
  # so we keep that file and add a CUSA00003.xml symlink so both paths
  # resolve to the same content.
  ansible.builtin.file:
    src: "{{ dg_shadps4_patch_name }}"
    dest: "{{ dg_box_home }}/.local/share/shadPS4/patches/{{ dg_shadps4_title_id }}.xml"
    state: link
    force: true

- name: Ensure shadPS4 addon install directory exists
  ansible.builtin.file:
    path: "{{ dg_shadps4_addon_install_dir }}"
    state: directory
    mode: "0755"

- name: Detect whether shadPS4 / QtLauncher is currently running
  # shadPS4 reads config.toml at startup and rewrites it at shutdown.
  # Editing while it's running means our changes get clobbered when
  # the user closes it. Detect first so we can fail with a clear msg.
  # Character classes avoid matching this guard's own pgrep command line
  # while still matching the real process names case-insensitively.
  ansible.builtin.command:
    argv:
      - pgrep
      - -fi
      - "[s]hadPS4QtLauncher|[s]hadps4-sdl|[c]heatengine"
  register: _shadps4_processes
  changed_when: false
  failed_when: false

- name: Refuse to touch config.toml while shadPS4 is running
  ansible.builtin.fail:
    msg: |
      shadPS4 / QtLauncher / cheatengine is currently running. Close
      it before re-running reset-configs --tags configs — otherwise
      the shadPS4 config.toml edits below would be silently
      overwritten when the GUI writes its config back on shutdown.
  when: _shadps4_processes.rc == 0

- name: Configure shadPS4 addonInstallDir in both config.toml files
  # shadPS4 keeps two parallel config files — one under .config/ (XDG
  # standard, written by Qt) and one under .local/share/ (used by the
  # emulator core). They drift independently when the user clicks
  # around the GUI, so keep both in sync with the canonical value.
  community.general.ini_file:
    path: "{{ item }}"
    section: GUI
    option: addonInstallDir
    value: '"{{ dg_shadps4_addon_install_dir }}"'
    backup: true
    create: false
    no_extra_spaces: false
  loop:
    - "{{ dg_box_home }}/.config/shadPS4/config.toml"
    - "{{ dg_box_home }}/.local/share/shadPS4/config.toml"
  loop_control:
    label: "{{ item }}"
