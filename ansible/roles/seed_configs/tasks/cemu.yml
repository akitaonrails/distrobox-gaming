---
- name: Ensure Cemu config directory exists
  ansible.builtin.file:
    path: "{{ dg_box_home }}/.config/Cemu"
    state: directory
    mode: "0755"

# force: false — Cemu mutates settings.xml at runtime (window position,
# game cache, recent files). Re-running the playbook after Cemu has
# written its own state would clobber that user data. Only seed if absent.
- name: Deploy Cemu baseline settings.xml (seed only if missing)
  ansible.builtin.template:
    src: cemu-settings.xml.j2
    dest: "{{ dg_box_home }}/.config/Cemu/settings.xml"
    force: false
    mode: "0644"

- name: Ensure Cemu controllerProfiles directory exists
  ansible.builtin.file:
    path: "{{ dg_box_home }}/.config/Cemu/controllerProfiles"
    state: directory
    mode: "0755"

# Captured from Cemu's GUI after mapping the user's 8BitDo Ultimate 2
# (SDLController API, Wii U Pro Controller). Seed only if missing so
# in-GUI remapping survives reset-configs runs.
- name: Seed Cemu controller profile (8BitDo Ultimate 2)
  ansible.builtin.copy:
    src: cemu/controller0.xml
    dest: "{{ dg_box_home }}/.config/Cemu/controllerProfiles/controller0.xml"
    force: false
    mode: "0644"
