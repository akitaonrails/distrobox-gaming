---
- name: Create SM64 Plus directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ dg_sm64plus_root }}"
    - "{{ dg_sm64plus_patch_dir }}"
    - "{{ dg_sm64plus_install_dir }}"
    - "{{ dg_box_home }}/bin"

- name: Install SM64 Plus build dependencies inside box
  ansible.builtin.shell: >-
    {{ dg_in_box }} sudo pacman -S --needed --noconfirm
    {{ dg_sm64plus_pacman_packages | join(' ') }}
  register: _sm64plus_pacman
  changed_when: "'installing' in _sm64plus_pacman.stdout or 'upgrading' in _sm64plus_pacman.stdout"

- name: Download SM64 Plus Linux OpenGL build patch
  ansible.builtin.get_url:
    url: "{{ dg_sm64plus_linux_opengl_patch_url }}"
    dest: "{{ dg_sm64plus_patch_dir }}/linux-opengl-pr134.patch"
    mode: "0644"

- name: Check out patched SM64 Plus source
  ansible.builtin.shell: |
    set -eu
    patch="{{ dg_sm64plus_patch_dir }}/linux-opengl-pr134.patch"

    if [ -d "{{ dg_sm64plus_source_dir }}/.git" ] &&
       [ -f "{{ dg_sm64plus_source_dir }}/.dg-source-ref" ] &&
       grep -qx "{{ dg_sm64plus_build_id }}" "{{ dg_sm64plus_source_dir }}/.dg-source-ref" &&
       [ "$(git -C "{{ dg_sm64plus_source_dir }}" rev-parse HEAD)" = "{{ dg_sm64plus_git_ref }}" ] &&
       (cd "{{ dg_sm64plus_source_dir }}" && git apply --reverse --check "$patch" >/dev/null 2>&1); then
      exit 0
    fi

    rm -rf "{{ dg_sm64plus_source_dir }}"
    git clone "{{ dg_sm64plus_repo_url }}" "{{ dg_sm64plus_source_dir }}"
    cd "{{ dg_sm64plus_source_dir }}"
    git checkout "{{ dg_sm64plus_git_ref }}"
    git apply "$patch"
    printf '%s\n' "{{ dg_sm64plus_build_id }}" > .dg-source-ref
    printf '%s\n' 'checked-out-sm64plus-source'
  register: _sm64plus_source
  changed_when: "'checked-out-sm64plus-source' in _sm64plus_source.stdout"

- name: Prepare verified SM64 US baserom for SM64 Plus
  ansible.builtin.shell: |
    python3 - <<'PY'
    from pathlib import Path
    import hashlib

    src = Path(r'''{{ dg_sm64plus_rom_source }}''')
    dst = Path(r'''{{ dg_sm64plus_source_dir }}/baserom.us.z64''')
    expected = '''{{ dg_sm64plus_baserom_sha1 }}'''

    data = src.read_bytes()
    magic = data[:4]
    if magic == bytes.fromhex('80371240'):
        z64 = data
    elif magic == bytes.fromhex('37804012'):
        # .n64/.v64 byte order: swap every 16-bit halfword into big-endian z64.
        z64 = b''.join(
            (data[i + 1:i + 2] + data[i:i + 1]) if i + 1 < len(data) else data[i:i + 1]
            for i in range(0, len(data), 2)
        )
    elif magic == bytes.fromhex('40123780'):
        # Little-endian words: reverse each 32-bit word into big-endian z64.
        z64 = b''.join(
            data[i:i + 4][::-1] if len(data[i:i + 4]) == 4 else data[i:i + 4]
            for i in range(0, len(data), 4)
        )
    else:
        raise SystemExit(f'unsupported N64 ROM byte order for {src}: magic={magic.hex()}')

    actual = hashlib.sha1(z64).hexdigest()
    if actual != expected:
        raise SystemExit(f'wrong Super Mario 64 US ROM SHA1 for {src}: {actual} != {expected}')

    if dst.exists() and dst.read_bytes() == z64:
        raise SystemExit(0)

    dst.write_bytes(z64)
    print(f'prepared-baserom {dst}')
    PY
  register: _sm64plus_baserom
  changed_when: "'prepared-baserom' in _sm64plus_baserom.stdout"

- name: Build SM64 Plus
  ansible.builtin.shell: |
    {{ dg_in_box }} sh -lc '
      set -eu
      cd "{{ dg_sm64plus_source_dir }}"
      if [ -x build/us_pc/sm64.us ] &&
         [ -f .dg-built-ref ] &&
         grep -qx "{{ dg_sm64plus_build_id }}" .dg-built-ref; then
        exit 0
      fi
      rm -rf build
      make -j"$(nproc)"
      test -x build/us_pc/sm64.us
      printf "%s\n" "{{ dg_sm64plus_build_id }}" > .dg-built-ref
      printf "%s\n" "built-sm64plus {{ dg_sm64plus_build_id }}"
    '
  register: _sm64plus_build
  changed_when: "'built-sm64plus' in _sm64plus_build.stdout"

- name: Install SM64 Plus build output
  ansible.builtin.shell: |
    set -eu
    if [ -x "{{ dg_sm64plus_install_dir }}/sm64.us" ] &&
       [ -f "{{ dg_sm64plus_install_dir }}/.dg-installed-ref" ] &&
       grep -qx "{{ dg_sm64plus_build_id }}" "{{ dg_sm64plus_install_dir }}/.dg-installed-ref"; then
      exit 0
    fi
    rm -rf "{{ dg_sm64plus_install_dir }}"
    mkdir -p "{{ dg_sm64plus_install_dir }}"
    cp -a "{{ dg_sm64plus_source_dir }}/build/us_pc/." "{{ dg_sm64plus_install_dir }}/"
    printf "%s\n" "{{ dg_sm64plus_build_id }}" > "{{ dg_sm64plus_install_dir }}/.dg-installed-ref"
    printf "%s\n" "installed-sm64plus {{ dg_sm64plus_install_dir }}"
  register: _sm64plus_install
  changed_when: "'installed-sm64plus' in _sm64plus_install.stdout"

- name: Install SM64 Plus launcher wrapper
  ansible.builtin.template:
    src: sm64plus.sh.j2
    dest: "{{ dg_sm64plus_bin }}"
    mode: "0755"
