---
- name: Create SpaghettiKart directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ dg_spaghettikart_root }}"
    - "{{ dg_spaghettikart_cache_dir }}"
    - "{{ dg_spaghettikart_install_dir }}"
    - "{{ dg_box_home }}/bin"

- name: Install SpaghettiKart build/runtime dependencies inside box
  ansible.builtin.shell: >-
    {{ dg_in_box }} sudo pacman -S --needed --noconfirm
    {{ dg_spaghettikart_pacman_packages | join(' ') }}
  register: _spaghettikart_pacman
  changed_when: "'installing' in _spaghettikart_pacman.stdout or 'upgrading' in _spaghettikart_pacman.stdout"

- name: Download pinned SpaghettiKart release ZIP
  ansible.builtin.get_url:
    url: "{{ dg_spaghettikart_asset_url }}"
    dest: "{{ dg_spaghettikart_cache_dir }}/{{ dg_spaghettikart_asset_name }}"
    checksum: "sha256:{{ dg_spaghettikart_asset_sha256 }}"
    mode: "0644"

- name: Check out SpaghettiKart source for asset extraction
  ansible.builtin.shell: |
    set -eu
    if [ -d "{{ dg_spaghettikart_source_dir }}/.git" ] &&
       [ -f "{{ dg_spaghettikart_source_dir }}/.dg-source-ref" ] &&
       grep -qx "{{ dg_spaghettikart_git_ref }}" "{{ dg_spaghettikart_source_dir }}/.dg-source-ref" &&
       [ "$(git -C "{{ dg_spaghettikart_source_dir }}" rev-parse HEAD)" = "{{ dg_spaghettikart_git_ref }}" ]; then
      exit 0
    fi

    rm -rf "{{ dg_spaghettikart_source_dir }}"
    git clone "{{ dg_spaghettikart_repo_url }}" "{{ dg_spaghettikart_source_dir }}"
    cd "{{ dg_spaghettikart_source_dir }}"
    git checkout "{{ dg_spaghettikart_git_ref }}"
    git submodule update --init torch libultraship
    test "$(git -C torch rev-parse HEAD)" = "{{ dg_spaghettikart_torch_ref }}"
    test "$(git -C libultraship rev-parse HEAD)" = "{{ dg_spaghettikart_libultraship_ref }}"
    printf '%s\n' "{{ dg_spaghettikart_git_ref }}" > .dg-source-ref
    printf '%s\n' 'checked-out-spaghettikart-source'
  register: _spaghettikart_source
  changed_when: "'checked-out-spaghettikart-source' in _spaghettikart_source.stdout"

- name: Prepare verified Mario Kart 64 US baserom for SpaghettiKart
  ansible.builtin.shell: |
    python3 - <<'PY'
    from pathlib import Path
    import hashlib

    src = Path(r'''{{ dg_spaghettikart_rom_source }}''')
    dst = Path(r'''{{ dg_spaghettikart_source_dir }}/baserom.us.z64''')
    expected = '''{{ dg_spaghettikart_rom_sha1 }}'''

    data = src.read_bytes()
    magic = data[:4]
    if magic == bytes.fromhex('80371240'):
        z64 = data
    elif magic == bytes.fromhex('37804012'):
        z64 = b''.join(
            (data[i + 1:i + 2] + data[i:i + 1]) if i + 1 < len(data) else data[i:i + 1]
            for i in range(0, len(data), 2)
        )
    elif magic == bytes.fromhex('40123780'):
        z64 = b''.join(
            data[i:i + 4][::-1] if len(data[i:i + 4]) == 4 else data[i:i + 4]
            for i in range(0, len(data), 4)
        )
    else:
        raise SystemExit(f'unsupported N64 ROM byte order for {src}: magic={magic.hex()}')

    actual = hashlib.sha1(z64).hexdigest()
    if actual != expected:
        raise SystemExit(f'wrong Mario Kart 64 US ROM SHA1 for {src}: {actual} != {expected}')

    if dst.exists() and dst.read_bytes() == z64:
        raise SystemExit(0)

    dst.write_bytes(z64)
    print(f'prepared-baserom {dst}')
    PY
  register: _spaghettikart_baserom
  changed_when: "'prepared-baserom' in _spaghettikart_baserom.stdout"

- name: Generate SpaghettiKart mk64.o2r from verified ROM
  ansible.builtin.shell: |
    {{ dg_in_box }} sh -lc '
      set -eu
      cd "{{ dg_spaghettikart_source_dir }}"
      if [ -s "{{ dg_spaghettikart_build_dir }}/mk64.o2r" ] &&
         [ -f .dg-assets-ref ] &&
         grep -qx "{{ dg_spaghettikart_install_id }}" .dg-assets-ref; then
        exit 0
      fi
      cmake -S . -B "{{ dg_spaghettikart_build_dir }}" -G Ninja -DCMAKE_BUILD_TYPE=Release
      cmake --build "{{ dg_spaghettikart_build_dir }}" --target ExtractAssets -j"$(nproc)"
      test -s "{{ dg_spaghettikart_build_dir }}/mk64.o2r"
      printf "%s\n" "{{ dg_spaghettikart_install_id }}" > .dg-assets-ref
      printf "%s\n" "generated-spaghettikart-assets {{ dg_spaghettikart_install_id }}"
    '
  register: _spaghettikart_assets
  changed_when: "'generated-spaghettikart-assets' in _spaghettikart_assets.stdout"

- name: Install SpaghettiKart AppImage release and generated assets
  ansible.builtin.shell: |
    {{ dg_in_box }} sh -lc '
      set -eu
      if [ -x "{{ dg_spaghettikart_install_dir }}/spaghetti.appimage" ] &&
         [ -s "{{ dg_spaghettikart_install_dir }}/mk64.o2r" ] &&
         [ -f "{{ dg_spaghettikart_install_dir }}/.dg-installed-ref" ] &&
         grep -qx "{{ dg_spaghettikart_install_id }}" "{{ dg_spaghettikart_install_dir }}/.dg-installed-ref"; then
        exit 0
      fi

      rm -rf "{{ dg_spaghettikart_install_dir }}"
      mkdir -p "{{ dg_spaghettikart_install_dir }}"
      unzip -q "{{ dg_spaghettikart_cache_dir }}/{{ dg_spaghettikart_asset_name }}" -d "{{ dg_spaghettikart_install_dir }}"
      chmod 0755 "{{ dg_spaghettikart_install_dir }}/spaghetti.appimage"
      cp -a "{{ dg_spaghettikart_build_dir }}/mk64.o2r" "{{ dg_spaghettikart_install_dir }}/mk64.o2r"
      printf "%s\n" "{{ dg_spaghettikart_install_id }}" > "{{ dg_spaghettikart_install_dir }}/.dg-installed-ref"
      printf "%s\n" "installed-spaghettikart {{ dg_spaghettikart_install_dir }}"
    '
  register: _spaghettikart_install
  changed_when: "'installed-spaghettikart' in _spaghettikart_install.stdout"

- name: Install SpaghettiKart launcher wrapper
  ansible.builtin.template:
    src: spaghettikart.sh.j2
    dest: "{{ dg_spaghettikart_bin }}"
    mode: "0755"
