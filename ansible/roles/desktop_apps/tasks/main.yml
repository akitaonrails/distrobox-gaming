---
- name: Ensure rendered desktop directory exists
  ansible.builtin.file:
    path: "{{ dg_desktop_render_dir }}"
    state: directory
    mode: "0755"

- name: Render core desktop entry templates
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "{{ dg_desktop_render_dir }}/{{ item }}"
    mode: "0644"
  loop:
    - gaming-shadps4-gui.desktop
    - gaming-flycast.desktop
    - gaming-eden-cheats-manager.desktop

- name: Render generic emulator launcher desktop entries
  ansible.builtin.template:
    src: emulator-launcher.desktop.j2
    dest: "{{ dg_desktop_render_dir }}/{{ launcher.name }}.desktop"
    mode: "0644"
  loop: "{{ dg_emulator_launchers }}"
  loop_control:
    loop_var: launcher
    label: "{{ launcher.name }}"

- name: Render Xenia Manager desktop entry
  ansible.builtin.template:
    src: gaming-xenia-manager.desktop.j2
    dest: "{{ dg_desktop_render_dir }}/gaming-xenia-manager.desktop"
    mode: "0644"

- name: Render Unleashed Recompiled desktop entry
  ansible.builtin.template:
    src: gaming-unleashed-recomp.desktop.j2
    dest: "{{ dg_desktop_render_dir }}/gaming-unleashed-recomp.desktop"
    mode: "0644"

- name: Render Sonic P-06 desktop entry
  ansible.builtin.template:
    src: gaming-sonic-p06.desktop.j2
    dest: "{{ dg_desktop_render_dir }}/gaming-sonic-p06.desktop"
    mode: "0644"

- name: Render Dusk desktop entry
  ansible.builtin.template:
    src: gaming-dusk.desktop.j2
    dest: "{{ dg_desktop_render_dir }}/gaming-dusk.desktop"
    mode: "0644"

- name: Check if desktop-file-validate is available
  ansible.builtin.command: "which desktop-file-validate"
  register: _dfv_check
  changed_when: false
  failed_when: false

- name: Find rendered desktop files
  ansible.builtin.find:
    paths: "{{ dg_desktop_render_dir }}"
    patterns: "*.desktop"
    file_type: file
  register: _rendered_desktop_files

- name: Validate desktop files
  ansible.builtin.command: "desktop-file-validate {{ item.path }}"
  loop: "{{ _rendered_desktop_files.files }}"
  loop_control:
    label: "{{ item.path | basename }}"
  changed_when: false
  failed_when: false
  when: _dfv_check.rc == 0

- name: Install rendered desktop files into host applications dir
  # Runs scripts/install-host-launchers.sh, which symlinks every
  # rendered entry into dg_host_applications_dir and removes stale
  # symlinks whose source was deleted from rendered/. Skips entries
  # whose target binary isn't installed in the configured box. The
  # script is idempotent — only emits "installed"/"removed stale"
  # for actual filesystem changes.
  ansible.builtin.command:
    cmd: "{{ dg_project_root }}/scripts/install-host-launchers.sh"
  environment:
    DG_DESKTOP_RENDER_DIR: "{{ dg_desktop_render_dir }}"
    DG_HOST_APPLICATIONS_DIR: "{{ dg_host_applications_dir }}"
  register: _host_launchers
  changed_when: >-
    'installed ' in _host_launchers.stdout or
    'removed stale ' in _host_launchers.stdout
