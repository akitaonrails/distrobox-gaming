---
- name: Check if distrobox exists
  ansible.builtin.shell: "distrobox list 2>/dev/null | awk '{print $3}' | grep -qx {{ dg_box_name }}"
  register: _box_exists
  changed_when: false
  failed_when: false

- name: Ensure box home directory exists
  ansible.builtin.file:
    path: "{{ dg_box_home }}"
    state: directory
    mode: "0755"

- name: Build distrobox create command
  # Note on :ro for NFS paths: when the host has the same NFS share
  # mounted RW (e.g. via autofs), the kernel resolves writes through
  # the parent RW mount and bypasses our :ro bind. The :ro flag IS set
  # (visible in findmnt / mount tables and respected by mount(2) calls)
  # but ordinary write(2) calls succeed. For strict RO enforcement,
  # restrict at the NFS server side instead.
  ansible.builtin.set_fact:
    _distrobox_volumes: >-
      --volume {{ dg_emudeck_root }}:{{ dg_emudeck_root }}:ro,rprivate
      --volume {{ dg_steam_root }}:{{ dg_steam_root }}:rw
      --volume {{ dg_host_applications_dir }}:{{ dg_host_applications_dir }}:rw
      {{ '--volume ' + dg_box_root + ':' + dg_box_root + ':rw'
         if dg_box_root != dg_box_home else '' }}

- name: Create distrobox
  ansible.builtin.command: >-
    distrobox create
    --name {{ dg_box_name }}
    --image {{ dg_image }}
    --home {{ dg_box_home }}
    {{ '--nvidia' if dg_nvidia_enabled else '' }}
    {{ _distrobox_volumes }}
  when: _box_exists.rc != 0

- name: Verify box UID matches host
  ansible.builtin.shell: "{{ dg_in_box }} id -u"
  register: _box_uid
  changed_when: false

- name: Verify box GID matches host
  ansible.builtin.shell: "{{ dg_in_box }} id -g"
  register: _box_gid
  changed_when: false

- name: Assert UID/GID match
  ansible.builtin.assert:
    that:
      - _box_uid.stdout | trim | int == dg_host_uid | int
      - _box_gid.stdout | trim | int == dg_host_gid | int
    fail_msg: >-
      Box UID:GID {{ _box_uid.stdout | trim }}:{{ _box_gid.stdout | trim }}
      does not match expected {{ dg_host_uid }}:{{ dg_host_gid }}
